<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="AI Job Hunter — it does everything but press send">
  <defs>
    <radialGradient id="glow" cx="20%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#e24b4a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#e24b4a" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
    <filter id="ink" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="2" dy="3" stdDeviation="0" flood-color="#000" flood-opacity="0.35"/></filter>
  </defs>

  <rect width="1280" height="360" fill="#0a0c11"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <rect width="1280" height="360" filter="url(#grain)" opacity="0.05"/>

  <g filter="url(#ink)">
    <rect x="214" y="34" width="196" height="50" rx="16" ry="13" fill="#fffef8" stroke="#1c1812" stroke-width="3"/>
    <path d="M250 84 l-4 24 l26 -24 z" fill="#fffef8" stroke="#1c1812" stroke-width="3"/>
    <text x="232" y="66" font-family="'Patrick Hand','Comic Sans MS',cursive" font-size="23" fill="#1c1812">please hire him</text>
  </g>

  <g transform="translate(92,150) scale(4.4)" fill="none" stroke="#e7ecf3" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" filter="url(#ink)">
    <circle cx="16" cy="16" r="12"/>
    <path d="M11 14 q2 2 4 0 M17 14 q2 2 4 0 M11 22 q5 -4 10 0"/>
    <ellipse cx="10" cy="18" rx="1.6" ry="2.8" fill="deepskyblue" stroke="none"/>
  </g>

  <text x="278" y="208" font-family="'Anton','Arial Narrow',Impact,sans-serif" font-weight="800" font-size="96" letter-spacing="1.5" fill="#f3f6fb" filter="url(#ink)">AI JOB HUNTER</text>

  <path d="M280 234 q140 15 280 5 q160 -12 380 7 q80 8 130 -2" fill="none" stroke="#e24b4a" stroke-width="7" stroke-linecap="round"/>

  <text x="282" y="288" font-family="'Space Mono','Courier New',monospace" font-size="26" fill="#c7d0dd">it does everything but press send.</text>

  <path d="M282 326 q320 24 660 3 q190 -12 320 2" fill="none" stroke="#e24b4a" stroke-width="2.4" stroke-dasharray="2 11" stroke-linecap="round" opacity="0.45"/>
</svg>
