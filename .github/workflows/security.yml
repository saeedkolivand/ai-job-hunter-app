name: 🛡️ Security Checks

# ╔════════════════════════════════════════════════════════════╗
# ║                     🔒 Security Pipeline                  ║
# ╚════════════════════════════════════════════════════════════╝

on:
  schedule:
    - cron: '0 3 * * 1'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.1.3

jobs:
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: ✅ Dependency Review Passed
        run: echo "📦 No critical dependency risks found." >> $GITHUB_STEP_SUMMARY

  npm-audit:
    name: 🧪 npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔎 Run npm Audit
        run: pnpm audit --audit-level high

      - name: ✅ npm Audit Passed
        run: echo "🧪 npm audit completed without high severity issues." >> $GITHUB_STEP_SUMMARY
