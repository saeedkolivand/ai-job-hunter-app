name: 🛡️ Security

# ──────────────────────────────────────────────────────────────────────
# Security Pipeline
# ──────────────────────────────────────────────────────────────────────
# Purpose: Automated security vulnerability scanning
# Triggers: Weekly (Mondays at 3 AM UTC), manual workflow_dispatch
# Jobs:
#   - npm-audit: npm/pnpm vulnerability scan
#   - cargo-audit: Rust/Cargo vulnerability scan
#
# Note: Dependency-review runs in ci-pipeline.yml on pull_request, where
#       the action can compare base vs head commits. It cannot run on
#       schedule because the action requires a pull_request event context.
# ──────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 3 * * 1'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: 📦 npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🔍 Run npm Audit
        id: npm-audit
        continue-on-error: true
        run: |
          echo "::group::Running npm audit"
          pnpm audit --audit-level high
          echo "::endgroup::"

      - name: ❌ Check for Audit Failures
        if: steps.npm-audit.outcome == 'failure'
        run: |
          echo "::error::npm audit found vulnerabilities. Please review the audit output above."
          exit 1

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 📦 npm Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm Audit | ${{ steps.npm-audit.outcome == 'success' && '✅ No vulnerabilities' || '❌ Vulnerabilities found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [npm Audit Docs](https://docs.npmjs.com/cli/v9/commands/npm-audit)" >> $GITHUB_STEP_SUMMARY

  cargo-audit:
    name: 🦀 Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📥 Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: 🔍 Run Cargo Audit
        id: cargo-audit
        continue-on-error: true
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo audit"
          cargo audit
          echo "::endgroup::"

      - name: ❌ Check for Audit Failures
        if: steps.cargo-audit.outcome == 'failure'
        run: |
          echo "::error::cargo audit found vulnerabilities. Please review the audit output above."
          exit 1

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 🦀 Cargo Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Audit | ${{ steps.cargo-audit.outcome == 'success' && '✅ No vulnerabilities' || '❌ Vulnerabilities found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Cargo Audit Docs](https://github.com/rustsec/cargo-audit)" >> $GITHUB_STEP_SUMMARY
