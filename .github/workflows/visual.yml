name: 🖼️ Visual Regression (advisory)

# ──────────────────────────────────────────────────────────────────────
# Lost Pixel screenshot-diffs the existing Storybook stories. Self-contained:
# baselines live in the repo (.lostpixel/baseline/), no hosted service.
# Advisory until baselines are committed — until then it reports every story as
# new (non-blocking) and uploads the generated images so they can be adopted as
# baselines (run `lost-pixel update` locally, or download + commit this artifact).
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lost-pixel:
    name: 🖼️ Lost Pixel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 📚 Build Storybook
        run: pnpm --filter @ajh/ui build-storybook

      - name: 🖼️ Run Lost Pixel (advisory)
        continue-on-error: true
        run: pnpm dlx lost-pixel@latest

      - name: 📊 Upload Lost Pixel output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lost-pixel-${{ github.run_id }}
          path: .lostpixel/
          retention-days: 7
          if-no-files-found: ignore
