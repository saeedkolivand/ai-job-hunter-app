name: 🖼️ Visual Regression (advisory)

# ──────────────────────────────────────────────────────────────────────
# Lost Pixel screenshot-diffs the existing Storybook stories. Self-contained:
# baselines live in the repo (.lostpixel/baseline/), no hosted service.
# Advisory until baselines are committed — until then it reports every story as
# new (non-blocking) and uploads the generated images so they can be adopted as
# baselines (run `lost-pixel update` locally, or download + commit this artifact).
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lost-pixel:
    name: 🖼️ Lost Pixel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 📚 Build Storybook
        run: pnpm --filter @ajh/ui build-storybook

      - name: 🌐 Install Playwright Chromium (for Lost Pixel)
        run: pnpm dlx playwright@1.47.2 install --with-deps chromium

      - name: 🖼️ Run Lost Pixel (advisory)
        continue-on-error: true
        run: pnpm dlx lost-pixel@3.22.0

      - name: 📊 Upload Lost Pixel output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lost-pixel-${{ github.run_id }}
          path: .lostpixel/
          retention-days: 7
          if-no-files-found: ignore
