name: 🚀 CI Pipeline

# ──────────────────────────────────────────────────────────────────────
# Continuous Integration Pipeline
# ──────────────────────────────────────────────────────────────────────
# Purpose: Validate code quality, type safety, and test coverage on every PR
# Triggers: pull_request to main only (push to main intentionally excluded — release.yml handles that)
# Jobs:
#   - dependencies: Install deps + build shared packages (cache producer)
#   - dependency-review: GitHub dependency review (PRs only)
#   - lint-format: ESLint and Prettier validation
#   - type-check: TypeScript type checking
#   - tests: JavaScript and Rust test suites
#   - build-verification: Production build validation
#   - quality-checks: Rust fmt, clippy, architecture boundary tests (R1-R8), cargo-deny, cargo-machete
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────
# Jobs
# Note: Runs on all PRs to main for comprehensive validation
# ──────────────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Dependency Review (PRs only)
  # Diffs the lockfile against the base branch and fails on high-severity
  # advisories. Cannot run on push/schedule — the action requires a
  # pull_request event context.
  # ──────────────────────────────────────────────────────────────────────
  dependency-review:
    name: 🔍 Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🔍 Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  # ──────────────────────────────────────────────────────────────────────
  # Detect which areas changed so the heavy jobs can skip on unrelated PRs.
  # Any change under .github/** forces BOTH filters true (full CI on CI edits).
  # ──────────────────────────────────────────────────────────────────────
  changes:
    name: 🧭 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🧭 Path filter
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            frontend:
              - 'apps/tauri/src/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.mjs'
              - 'vitest.config.ts'
              - 'turbo.json'
              - '.github/**'
            rust:
              - 'apps/tauri/src-tauri/**'
              - '.github/**'

  dependencies:
    name: 📦 Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      cache-key: ${{ steps.cache-key.outputs.value }}

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: false

      - name: 🔑 Generate Cache Key
        id: cache-key
        run: echo "value=${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/turbo.json') }}" >> $GITHUB_OUTPUT

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ steps.cache-key.outputs.value }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: 🔨 Build Shared Packages
        run: |
          echo "::group::Building shared packages"
          pnpm build:packages
          echo "::endgroup::"

      - name: 📦 Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

  lint-format:
    name: ✨ Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: dependencies

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: false

      - name: 💾 Restore node_modules Cache
        id: restore-node-modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install Dependencies (cache miss fallback)
        if: steps.restore-node-modules.outputs.cache-hit != 'true'
        run: |
          echo "::warning::node_modules cache miss — falling back to pnpm install"
          pnpm install --frozen-lockfile

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🔍 Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          echo "::group::Running ESLint"
          pnpm lint:strict
          echo "::endgroup::"

      - name: 🎨 Check Formatting
        id: format
        continue-on-error: true
        run: |
          echo "::group::Checking formatting"
          pnpm format:check
          echo "::endgroup::"

      - name: 🧬 Check IPC Codegen Drift
        id: gen_ipc
        continue-on-error: true
        run: |
          echo "::group::Checking IPC codegen drift"
          pnpm gen:ipc:check
          echo "::endgroup::"

      - name: ❌ Check for Failures
        if: steps.eslint.outcome == 'failure' || steps.format.outcome == 'failure' || steps.gen_ipc.outcome == 'failure'
        run: |
          echo "::error file=package.json::Lint, format, or IPC codegen check failed. Run 'pnpm lint:fix', 'pnpm format', and 'pnpm gen:ipc' locally to fix."
          echo "::error::Please fix the issues above before merging."
          exit 1

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## ✨ Lint & Format Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.eslint.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier | ${{ steps.format.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [ESLint Rules](https://eslint.org/docs/latest/rules/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Prettier Options](https://prettier.io/docs/en/options.html)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────
  # Type Check
  # ──────────────────────────────────────────────────────────────────────
  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, dependencies]
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: false

      - name: 💾 Restore node_modules Cache
        id: restore-node-modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install Dependencies (cache miss fallback)
        if: steps.restore-node-modules.outputs.cache-hit != 'true'
        run: |
          echo "::warning::node_modules cache miss — falling back to pnpm install"
          pnpm install --frozen-lockfile

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🏗️ Restore Package Build Outputs
        run: |
          echo "::group::Building shared packages"
          pnpm build:packages
          echo "::endgroup::"

      - name: 🗺️ Generate Route Tree
        run: |
          echo "::group::Generating route tree"
          pnpm --filter @ajh/tauri build:frontend
          echo "::endgroup::"

      - name: 🔍 Run Type Check
        id: typecheck
        run: |
          echo "::group::Running type check"
          pnpm typecheck
          echo "::endgroup::"

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 🔍 Type Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ steps.typecheck.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [TypeScript Documentation](https://www.typescriptlang.org/docs/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────────────────────────
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
      pull-requests: write # post the JS coverage PR comment

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: false

      - name: 💾 Restore node_modules Cache
        id: restore-node-modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install Dependencies (cache miss fallback)
        if: steps.restore-node-modules.outputs.cache-hit != 'true'
        run: |
          echo "::warning::node_modules cache miss — falling back to pnpm install"
          pnpm install --frozen-lockfile

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      # The @storybook/addon-vitest "storybook" project
      # (packages/ui/vitest.storybook.config.ts) runs every story as a test in
      # headless Chromium. The browser binary lives in ~/.cache/ms-playwright
      # (outside node_modules), so cache it keyed on the lockfile (which changes
      # when the playwright version bumps) to skip the ~120 MB download.
      - name: 💾 Restore Playwright Browser Cache
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      # Cache hit → only the apt system deps need (re)installing (fast); cache
      # miss → download the browser binary and its deps.
      - name: 🎭 Install Playwright Chromium
        run: |
          echo "::group::Installing Playwright Chromium"
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            pnpm --filter @ajh/ui exec playwright install-deps chromium
          else
            pnpm --filter @ajh/ui exec playwright install --with-deps chromium
          fi
          echo "::endgroup::"

      - name: 🧪 Run Tests + Coverage
        id: js-tests
        continue-on-error: true
        # NO_COLOR makes Vitest emit plain (no-ANSI) output so the "Tests N
        # passed" line and the coverage block parse cleanly in the summary step.
        env:
          NO_COLOR: '1'
        run: |
          echo "::group::Running tests with coverage"
          set -o pipefail
          pnpm test:coverage 2>&1 | tee coverage-output.txt
          echo "::endgroup::"

      - name: 📊 Coverage Table → Job Summary
        if: always()
        run: |
          {
            echo "## 🧪 Test Coverage"
            echo ""
            if [ -f coverage-output.txt ]; then
              # Compact summary (Statements/Branches/Functions/Lines totals).
              echo '```'
              awk '/Coverage summary/{p=1} p; /^={10,}$/{if(p)c++} c>=2{exit}' coverage-output.txt
              echo '```'
              echo ""
              echo "<details><summary>Per-file coverage report</summary>"
              echo ""
              echo '```'
              awk '/Coverage report from v8/{p=1} p && /\|/' coverage-output.txt
              echo '```'
              echo ""
              echo "</details>"
            else
              echo "_Coverage report not generated._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Post the JS coverage as a PR comment (per-file + totals), replacing what
      # Codecov would have shown — fully in-Actions. Advisory: fork PRs get a
      # read-only token so the comment can't post (that's fine).
      - name: 📊 JS Coverage PR Comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0

      # cargo-llvm-cov collects coverage; cargo-nextest is the test runner
      # (parallel, flaky-retry, faster, clearer output). `cargo llvm-cov nextest`
      # runs the suite ONCE instrumented; `report` formats it afterward. This
      # binary crate has no doctests, so nextest not running doctests loses
      # nothing. Both must be installed before the test step below.
      - name: 🦀 Install cargo-llvm-cov + nextest
        if: always()
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: 🦀 Cargo Test (nextest)
        id: rust-tests
        continue-on-error: true
        working-directory: apps/tauri/src-tauri
        env:
          # Select the nextest [profile.ci] (flaky retries) via env — passing
          # --profile would collide with cargo's build-profile flag via llvm-cov.
          NEXTEST_PROFILE: ci
        run: |
          echo "::group::Running tests via nextest (instrumented for coverage)"
          set -o pipefail
          # --no-report runs the suite via nextest (the pass/fail gate) and records
          # raw coverage data without formatting a report yet.
          cargo llvm-cov nextest --no-report --all-features 2>&1 | tee rust-test-output.txt
          echo "::endgroup::"

      # Coverage reporting only — never gates the build (test pass/fail is owned
      # by the Cargo Test step above). `report` just formats the data the test
      # step already collected — no second compile, no second test run.
      - name: 📊 Rust Coverage → Job Summary
        if: always()
        continue-on-error: true
        working-directory: apps/tauri/src-tauri
        run: |
          if cargo llvm-cov report --summary-only 2>&1 | tee rust-coverage.txt; then
            {
              echo "## 🦀 Rust Coverage"
              echo ""
              echo '```'
              cat rust-coverage.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_Rust coverage report unavailable._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: ❌ Check for Test Failures
        if: steps.js-tests.outcome == 'failure' || steps.rust-tests.outcome == 'failure'
        run: |
          echo "::error::Tests or coverage thresholds failed. Run 'pnpm test:coverage' locally to reproduce."
          echo "::error::Check the test output above for specific failures."
          exit 1

      - name: 📊 Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_id }}
          # Restricted to coverage and Cargo test logs. Uploading the full
          # target/ directory routinely produces multi-GB artifacts.
          path: |
            coverage/
            apps/tauri/src-tauri/target/**/*.log
            apps/tauri/src-tauri/target/debug/deps/*.json
          retention-days: 7
          compression-level: 9
          if-no-files-found: ignore

      - name: 📊 Tests & Coverage Summary
        if: always()
        run: |
          # --- Frontend (Vitest, v8 text-summary: Statements/Branches/Functions/Lines) ---
          covpct() { grep -aiE "^[[:space:]]*$1[[:space:]]*:" coverage-output.txt 2>/dev/null | grep -oE '[0-9]+(\.[0-9]+)?%' | head -1; }
          js_pass=$(grep -aoE 'Tests[[:space:]]+[0-9]+ passed' coverage-output.txt 2>/dev/null | grep -oE '[0-9]+' | tail -1)
          js_lines=$(covpct Lines); js_branches=$(covpct Branches); js_funcs=$(covpct Functions)
          # --- Rust (cargo-nextest + cargo-llvm-cov) ---
          # nextest prints one Summary line: "N tests run: N passed, ...".
          rust_pass=$(grep -aoE '[0-9]+ passed' apps/tauri/src-tauri/rust-test-output.txt 2>/dev/null | grep -oE '[0-9]+' | tail -1)
          # llvm-cov TOTAL row on stable reports three percentages in order: Regions, Functions, Lines.
          rust_pcts=$(grep -aE '^TOTAL' apps/tauri/src-tauri/rust-coverage.txt 2>/dev/null | grep -oE '[0-9]+(\.[0-9]+)?%')
          rust_funcs=$(echo "$rust_pcts" | sed -n 2p); rust_lines=$(echo "$rust_pcts" | sed -n 3p)
          rust_branches="—"  # not available from cargo-llvm-cov on stable Rust
          : "${js_pass:=n/a}" "${js_lines:=n/a}" "${js_branches:=n/a}" "${js_funcs:=n/a}"
          : "${rust_pass:=n/a}" "${rust_lines:=n/a}" "${rust_funcs:=n/a}"
          js_status="${{ steps.js-tests.outcome == 'success' && '✅ pass' || '❌ fail' }}"
          rust_status="${{ steps.rust-tests.outcome == 'success' && '✅ pass' || '❌ fail' }}"
          {
            echo "## 🧪 Tests & Coverage"
            echo ""
            echo "| Suite | Status | Tests passed | Lines | Branches | Functions |"
            echo "| --- | :---: | ---: | ---: | ---: | ---: |"
            echo "| 🟢 Frontend (Vitest) | ${js_status} | ${js_pass} | ${js_lines} | ${js_branches} | ${js_funcs} |"
            echo "| 🦀 Rust (nextest) | ${rust_status} | ${rust_pass} | ${rust_lines} | ${rust_branches} | ${rust_funcs} |"
            echo ""
            echo "<sub>Rust tests run via cargo-nextest; coverage via cargo-llvm-cov (regions/functions/lines — branch coverage needs nightly, shown as —). Frontend coverage from the v8 reporter. Per-file breakdowns are in the coverage sections above.</sub>"
            echo ""
            echo "**Environment** — Node $(node --version) · Rust $(rustc --version) · pnpm $(pnpm --version)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "Rust Version: $(rustc --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────
  # Build Verification
  # ──────────────────────────────────────────────────────────────────────
  build-verification:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, dependencies]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.rust == 'true'

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: false

      - name: 💾 Restore node_modules Cache
        id: restore-node-modules
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📥 Install Dependencies (cache miss fallback)
        if: steps.restore-node-modules.outputs.cache-hit != 'true'
        run: |
          echo "::warning::node_modules cache miss — falling back to pnpm install"
          pnpm install --frozen-lockfile

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ needs.dependencies.outputs.cache-key }}

      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust

      - name: 🦀 Cargo Check
        id: cargo-check
        continue-on-error: true
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo check"
          cargo check --all-targets --all-features
          echo "::endgroup::"

      - name: 🏗️ Verify Production Build
        id: prod-build
        continue-on-error: true
        run: |
          echo "::group::Building production application"
          pnpm build
          echo "::endgroup::"

      - name: ❌ Check for Build Failures
        if: steps.cargo-check.outcome == 'failure' || steps.prod-build.outcome == 'failure'
        run: |
          echo "::error::Build verification failed. Run 'pnpm build' locally to reproduce."
          echo "::error::Check the build output above for specific errors."
          exit 1

      - name: 📊 Upload Build Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ github.run_id }}
          # Restricted to logs/output to avoid uploading the multi-GB
          # target/ tree on failure.
          path: |
            apps/tauri/src-tauri/target/**/*.log
            apps/tauri/src-tauri/target/**/output
            node_modules/.cache/
          retention-days: 7
          compression-level: 9
          if-no-files-found: ignore

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 🏗️ Build Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Check | ${{ steps.cargo-check.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production Build | ${{ steps.prod-build.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cargo-check.outcome }}" == "failure" ] || [ "${{ steps.prod-build.outcome }}" == "failure" ]; then
            echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "Build artifacts uploaded: \`build-artifacts-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Tauri Docs](https://tauri.app/v1/guides/) • [Rust Book](https://doc.rust-lang.org/book/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "Rust Version: $(rustc --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────
  # Quality Checks
  # ──────────────────────────────────────────────────────────────────────
  quality-checks:
    name: 🔬 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: needs.changes.outputs.rust == 'true'

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt

      - name: 🎨 Cargo Format Check
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo fmt --check"
          cargo fmt --all -- --check
          echo "::endgroup::"

      - name: 🦀 Cargo Clippy
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo clippy"
          cargo clippy --all-targets --all-features -- -D warnings
          echo "::endgroup::"

      # Architecture boundary enforcement — docs/architecture-rules.md (R1–R8).
      # Supersedes the previous ad-hoc grep guardrails: the rules now live in a
      # versioned Rust test (tests/architecture.rs) with explicit, dead-entry-guarded
      # allowlists, so drift is blocked and exceptions can't silently rot.
      - name: 🏛️ Architecture Boundary Tests
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running architecture boundary tests"
          cargo test --test architecture
          echo "::endgroup::"

      - name: 🧰 Install cargo-deny + cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-machete

      # Supply-chain policy (advisories, licenses, bans, sources). cargo-deny's
      # advisory check covers RUSTSEC, gating vulnerabilities on every PR (the
      # weekly standalone cargo-audit in security.yml stays as a scheduled sweep).
      - name: 🛡️ Cargo Deny
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo deny"
          cargo deny check
          echo "::endgroup::"

      - name: 🧹 Cargo Machete (unused dependencies)
        working-directory: apps/tauri/src-tauri
        run: |
          echo "::group::Running cargo machete"
          cargo machete
          echo "::endgroup::"

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 🔬 Quality Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Tooling |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Formatting | \`cargo fmt --check\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lints | \`cargo clippy -D warnings\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture boundaries | \`cargo test --test architecture\` (R1–R8) |" >> $GITHUB_STEP_SUMMARY
          echo "| Supply chain | \`cargo deny check\` (advisories/licenses/bans/sources) |" >> $GITHUB_STEP_SUMMARY
          echo "| Unused deps | \`cargo machete\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Architecture rules: docs/architecture-rules.md • analysis: docs/architecture-analysis.md_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Clippy Lints](https://rust-lang.github.io/rust-clippy/master/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Rust Version: $(rustc --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────────
  # Umbrella gate — the single required status check for branch protection.
  # Passes if every gated job SUCCEEDED or was SKIPPED (path-filtered out), and
  # fails if any failed/cancelled. Make THIS ("✅ CI OK") the only required
  # check in the ruleset so path-skipped jobs never leave a required check
  # stuck "pending".
  # ──────────────────────────────────────────────────────────────────────
  ci-ok:
    name: ✅ CI OK
    if: always()
    needs: [lint-format, type-check, tests, build-verification, quality-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ✅ Verify required jobs
        run: |
          results="${{ needs.lint-format.result }} ${{ needs.type-check.result }} ${{ needs.tests.result }} ${{ needs.build-verification.result }} ${{ needs.quality-checks.result }}"
          echo "Job results: $results"
          for r in $results; do
            case "$r" in
              success | skipped) ;;
              *)
                echo "::error::A required job did not pass (result: $r)"
                exit 1
                ;;
            esac
          done
          echo "All required jobs passed or were skipped."
