name: 🏷️ Labeler

# ──────────────────────────────────────────────────────────────────────
# PR auto-labeler — chips PRs by touched area (see .github/labeler.yml).
#
# Uses `pull_request_target` so it also labels PRs from forks: labeler v5
# reads the diff via the GitHub API and does NOT check out or run PR code,
# so the elevated token here never executes untrusted code. Do NOT add a
# checkout of the PR head or run any PR scripts in this workflow.
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# Least privilege: read repo metadata, write the PR labels.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    name: 🏷️ Apply Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 🏷️ Label PR
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          sync-labels: true
