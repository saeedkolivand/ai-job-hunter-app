name: 🏷️ PR Labeler

# ──────────────────────────────────────────────────────────────────────
# Applies area/type labels to pull requests from their changed paths
# (config: .github/labeler.yml). Uses the `pull_request` trigger — branches
# are in-repo, so the job gets a write token WITHOUT the pull_request_target
# untrusted-checkout footgun; actions/labeler reads the diff via the API and
# never checks out or runs PR code. sync-labels:false → never strips a label
# a maintainer added by hand.
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: 🏷️ Apply labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🏷️ Label by changed paths
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
        with:
          sync-labels: false
