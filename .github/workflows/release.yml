name: 🚀 Release

# ──────────────────────────────────────────────────────────────────────
# Release Pipeline
# ──────────────────────────────────────────────────────────────────────
# Purpose: Automated semantic release (on push) + on-demand Tauri installer builds
# Triggers:
#   - push to main      → create the GitHub release + sync version files (NO build)
#   - workflow_dispatch → build installers for a chosen tag (the only build path)
# Jobs:
#   - release: Determine version, sync version files + changelog, create the
#       GitHub release, and commit the bump back to main (push only)
#   - build: Build Tauri apps for Windows, Linux, and macOS (manual / dispatch only)
#   - generate-update-manifest: Publish latest.json for the auto-updater
#   - update-cask: Pin the Homebrew cask to the built dmgs (version + per-arch sha256)
#
# Merging to main publishes the release + version bump but does NOT build
# installers — those cross-platform compiles are slow, so they're decoupled from
# the every-merge release flow. Build installers on demand from the Actions tab
# ("Run workflow") — leave the version input blank for the latest tag, or pass one.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build installers for, e.g. 0.61.0 (blank = latest tag)'
        required: false
        type: string

# Least-privilege default; each job grants only the writes it actually uses.
permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: 📦 Create Release
    # Versioning + release notes run automatically on merge; the installer build
    # is a separate manual step (see the `build` job).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # semantic-release (@semantic-release/github + /git): push commits & tags,
      # create the GitHub Release, and comment on the issues/PRs it shipped.
      contents: write
      issues: write
      pull-requests: write

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # @semantic-release/git pushes the release commit (CHANGELOG + version
          # files) to protected main over the deploy key the other jobs already use.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: ⚙️ Configure Git
        run: |
          echo "::group::Configuring git"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

      - name: 🏷️ Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HUSKY: 0

      - name: 📝 Release Summary
        if: always()
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Published | ${{ steps.semantic.outputs.new_release_published == 'true' && '✅ Yes' || '❌ No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.semantic.outputs.new_release_version || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Semantic Release Docs](https://semantic-release.gitbook.io/semantic-release/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"

  build:
    name: 🏗️ Build Tauri Apps
    # Manual-only: installers are built on demand from the Actions tab
    # ("Run workflow"), never automatically on a release push — the cross-platform
    # compiles are slow, so they're decoupled from the every-merge release flow.
    # The build self-syncs version files and checks out the resolved tag, so it
    # needs nothing from the push-only release job.
    if: github.event_name == 'workflow_dispatch'

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        # macOS compiles each arch as its own parallel leg (one runner each)
        # instead of building Intel then Apple Silicon sequentially on one
        # runner — that serial double-build was the slowest leg of the matrix.
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch_suffix: intel
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch_suffix: apple-silicon

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    # Uploads installer assets to the GitHub Release (softprops/action-gh-release).
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository (for tag lookup)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: 🏷️ Resolve Version
        id: resolve
        env:
          # Passed via env (not inline) to avoid script injection from the input.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(git tag --sort=-version:refname | head -n1)"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::No release tags found. Create a release first or provide a version manually."
            exit 1
          fi

          VERSION="$(echo "$VERSION" | sed 's/^v*//')"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Could not resolve a valid version (got '$VERSION'). Pass one via the workflow input."
            exit 1
          fi
          # Using a non-secret prefix to prevent false positive secret masking
          # that would otherwise blank the output and break the manifest generator.
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building installers for v$VERSION"

      - name: 📥 Checkout Release Tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.resolve.outputs.version }}
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: 🐧 Install Linux Dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: latest

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true
          # Separate cache per macOS arch so the two legs don't clobber each
          # other (empty on Windows/Linux — single cache as before).
          key: ${{ matrix.target }}

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: 🔖 Sync Release Version
        run: |
          echo "::group::Syncing Tauri release metadata"
          VERSION="${{ steps.resolve.outputs.version }}"
          node scripts/sync-tauri-version.cjs "${VERSION#v}"
          echo "::endgroup::"

      - name: 🔨 Build Workspace
        run: |
          echo "::group::Building workspace packages"
          pnpm build:packages
          echo "::endgroup::"

      - name: 🎯 Add Rust Target (macOS only)
        if: runner.os == 'macOS'
        run: |
          echo "::group::Adding ${{ matrix.target }} target"
          rustup target add ${{ matrix.target }}
          echo "::endgroup::"

      - name: 🏗️ Build Tauri Application
        id: tauri-build
        continue-on-error: true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "::group::Building Tauri application"
          if [ "${{ runner.os }}" == "macOS" ]; then
            # One arch per leg — the matrix runs Intel + Apple Silicon in parallel.
            pnpm --filter @ajh/tauri tauri build --target ${{ matrix.target }}
          else
            # Build for current platform (Linux or Windows)
            pnpm --filter @ajh/tauri tauri build
          fi
          echo "::endgroup::"

      - name: ❌ Check for Build Failures
        if: steps.tauri-build.outcome == 'failure'
        run: |
          echo "::error::Tauri build failed on ${{ matrix.platform }}. Please review the build output above."
          exit 1

      - name: 🔐 Verify Updater Signing Key
        if: steps.tauri-build.outcome == 'success'
        run: |
          echo "::group::Verifying updater signature key matches committed pubkey"
          # Fails the build if artifacts were signed with a key that does not
          # match the pubkey shipped in the app — which would break the
          # auto-updater for every user. See docs/DEPLOYMENT.md (Updater signing keys).
          node scripts/verify-updater-key.cjs
          echo "::endgroup::"

      - name: 🏷️ Normalize Artifact Names
        if: success()
        run: |
          echo "::group::Normalizing artifact names (replacing spaces with dashes)"
          # Tauri keeps spaces from productName in artifact filenames. Replace spaces
          # with dashes so URLs in latest.json don't need encoding and the manifest
          # generator can match deterministic names across all platforms.
          if [ -d apps/tauri/src-tauri/target ]; then
            find apps/tauri/src-tauri/target -type f -name '* *' -print0 | \
              while IFS= read -r -d '' f; do
                dir="$(dirname "$f")"
                base="$(basename "$f")"
                new="${base// /-}"
                if [ "$base" != "$new" ]; then
                  mv "$f" "$dir/$new"
                  echo "Renamed: $base -> $new"
                fi
              done
          fi
          echo "::endgroup::"

      - name: 🏷️ Disambiguate macOS Artifact Architecture
        if: runner.os == 'macOS' && success()
        run: |
          echo "::group::Tagging macOS artifacts with architecture suffix"
          shopt -s nullglob
          # Each arch leg emits identically named .app.tar.gz / .dmg files and
          # both upload to the same release — without a suffix the two legs would
          # collide by name (and race the upload action). Suffix this leg's macOS
          # artifacts (and the updater .sig) with its architecture so names are
          # unique and latest.json can serve the correct binary per arch.
          tag_macos_artifacts() {
            local triple="$1" suffix="$2" base
            base="apps/tauri/src-tauri/target/${triple}/release/bundle"
            for f in "${base}"/dmg/*.dmg; do
              mv "$f" "${f%.dmg}-${suffix}.dmg"
              echo "Renamed (${suffix}): $(basename "$f")"
            done
            for f in "${base}"/macos/*.app.tar.gz; do
              mv "$f" "${f%.app.tar.gz}-${suffix}.app.tar.gz"
              echo "Renamed (${suffix}): $(basename "$f")"
            done
            for f in "${base}"/macos/*.app.tar.gz.sig; do
              mv "$f" "${f%.app.tar.gz.sig}-${suffix}.app.tar.gz.sig"
              echo "Renamed (${suffix}): $(basename "$f")"
            done
          }
          tag_macos_artifacts "${{ matrix.target }}" "${{ matrix.arch_suffix }}"
          echo "::endgroup::"

      - name: 🏷️ Prefix Artifacts With Platform
        if: success()
        run: |
          echo "::group::Prefixing artifacts with platform (windows-/macos-/linux-)"
          # Prepend "<os>-" to every uploadable bundle artifact so the flat,
          # alphabetically sorted GitHub Release asset list clusters by platform.
          # Upload globs are extension-based (*.exe, *.dmg, …) so they still match;
          # latest.json generation + the Homebrew cask reference the prefixed names.
          case "$RUNNER_OS" in
            Windows) p=windows ;;
            macOS)   p=macos ;;
            *)       p=linux ;;
          esac
          shopt -s nullglob
          base=apps/tauri/src-tauri/target
          for f in \
            "$base"/release/bundle/nsis/*.exe "$base"/release/bundle/nsis/*.sig \
            "$base"/release/bundle/msi/*.msi \
            "$base"/*/release/bundle/dmg/*.dmg \
            "$base"/*/release/bundle/macos/*.tar.gz "$base"/*/release/bundle/macos/*.tar.gz.sig \
            "$base"/release/bundle/deb/*.deb "$base"/release/bundle/rpm/*.rpm \
            "$base"/release/bundle/appimage/*.AppImage "$base"/release/bundle/appimage/*.AppImage.sig; do
            d=$(dirname "$f"); b=$(basename "$f")
            case "$b" in "$p"-*) continue ;; esac
            mv "$f" "$d/${p}-$b"
            echo "Prefixed: $b -> ${p}-$b"
          done
          echo "::endgroup::"

      - name: Upload Release Assets
        if: success()
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.resolve.outputs.version }}
          # Tauri only emits .sig files for NSIS, AppImage, and macOS .app.tar.gz
          # bundles (the targets the auto-updater consumes). MSI/DEB/RPM never
          # produce .sig artifacts so they're not listed.
          files: |
            apps/tauri/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri/src-tauri/target/release/bundle/nsis/*.sig
            apps/tauri/src-tauri/target/release/bundle/msi/*.msi
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            apps/tauri/src-tauri/target/release/bundle/deb/*.deb
            apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm
            apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-logs-${{ matrix.platform }}-${{ github.run_id }}
          # Restrict to logs and bundler output to avoid uploading multi-GB
          # compiled artifacts. The full target/ tree is too large for CI.
          path: |
            apps/tauri/src-tauri/target/release/bundle/**
            apps/tauri/src-tauri/target/**/*.log
            apps/tauri/src-tauri/target/**/output
          retention-days: 7
          compression-level: 9
          if-no-files-found: ignore

      - name: 📝 Job Summary
        if: always()
        run: |
          echo "## 🏗️ Tauri Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.tauri-build.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.resolve.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tauri-build.outcome }}" == "failure" ]; then
            echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "Build logs uploaded: \`build-logs-${{ matrix.platform }}-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Tauri Build Guide](https://tauri.app/v1/guides/building/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "Rust Version: $(rustc --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "::endgroup::"

  package-extension:
    name: 🧩 Package Extension
    # Manual-only: the browser extension is built + attached to the Release on
    # demand from the Actions tab ("Run workflow"), never automatically on a
    # release push — so we don't publicly attach the current placeholder-ID
    # build to every auto-release. Mirrors the installer `build` job philosophy.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Uploads the zipped extension to the GitHub Release (softprops/action-gh-release).
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository (for tag lookup)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: 🏷️ Resolve Version
        id: resolve
        env:
          # Passed via env (not inline) to avoid script injection from the input.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(git tag --sort=-version:refname | head -n1)"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::No release tags found. Create a release first or provide a version manually."
            exit 1
          fi

          VERSION="${VERSION#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::Could not resolve a valid version (got '$VERSION'). Pass one via the workflow input."
            exit 1
          fi
          # Using a non-secret prefix to prevent false positive secret masking
          # that would otherwise blank the output and break the manifest generator.
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging extension for v$VERSION"

      - name: 📥 Checkout Release Tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ steps.resolve.outputs.version }}
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: 🔨 Build Extension
        run: |
          echo "::group::Building shared packages"
          pnpm build:packages
          echo "::endgroup::"
          echo "::group::Building browser extension"
          pnpm --filter @ajh/extension build
          echo "::endgroup::"

      - name: 🗜️ Zip Extension Bundles
        run: |
          echo "::group::Zipping chrome + firefox bundles"
          VERSION="${{ steps.resolve.outputs.version }}"
          ( cd apps/extension/dist && zip -r "$GITHUB_WORKSPACE/ai-job-hunter-extension-chrome-${VERSION}.zip" chrome && zip -r "$GITHUB_WORKSPACE/ai-job-hunter-extension-firefox-${VERSION}.zip" firefox )
          echo "::endgroup::"

      - name: 📤 Upload Extension to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.resolve.outputs.version }}
          files: |
            ai-job-hunter-extension-chrome-${{ steps.resolve.outputs.version }}.zip
            ai-job-hunter-extension-firefox-${{ steps.resolve.outputs.version }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Job Summary
        if: always()
        run: |
          {
            echo "## 🧩 Package Extension Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Version | \`${{ steps.resolve.outputs.version }}\` |"
            echo ""
            echo "### 🔧 Environment"
            echo "- **Node**: $(node --version)"
            echo "- **pnpm**: $(pnpm --version)"
          } >> "$GITHUB_STEP_SUMMARY"

  generate-update-manifest:
    name: 📝 Generate Update Manifest
    # Runs after the manual installer build to (re)generate latest.json from the
    # uploaded signatures. Auto-skipped if the build was skipped or failed.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Uploads latest.json to the GitHub Release (softprops/action-gh-release).
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: 🏷️ Resolve Release Version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(git tag --sort=-version:refname | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "::error::No release tags found"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: 🏷️ Generate latest.json
        run: |
          echo "::group::Generating latest.json"
          VERSION="${{ steps.version.outputs.version }}"
          # Raw version for JSON (e.g., 0.70.0)
          RAW_VERSION="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Start JSON structure
          cat > latest.json << EOF
          {
            "version": "$RAW_VERSION",
            "notes": "See https://github.com/saeedkolivand/ai-job-hunter-app/releases/tag/$VERSION for details",
            "pub_date": "$PUB_DATE",
            "platforms": {
          EOF

          # Download all release assets to inspect
          gh release download "$VERSION" --dir temp/ || true

          # Debug: list all downloaded files
          echo "::group::All downloaded release files"
          ls -la temp/ || echo "temp directory is empty"
          echo "::endgroup::"

          # Filenames below match the normalized names produced by the
          # "Normalize Artifact Names" step in the build job (spaces -> dashes), plus
          # the OS prefixes from the "Prefix Artifacts With Platform" step.
          BASE_URL="https://github.com/saeedkolivand/ai-job-hunter-app/releases/download/$VERSION"

          # Windows (NSIS is the primary updater target)
          NSIS_SIG="temp/windows-AI-Job-Hunter_${RAW_VERSION}_x64-setup.exe.sig"
          if [ -f "$NSIS_SIG" ]; then
            SIG=$(tr -d '\n' < "$NSIS_SIG")
            echo '    "windows-x86_64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/windows-AI-Job-Hunter_${RAW_VERSION}_x64-setup.exe\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::Windows NSIS signature not found at $NSIS_SIG"
          fi

          # Linux (AppImage is the primary updater target)
          APPIMAGE_SIG="temp/linux-AI-Job-Hunter_${RAW_VERSION}_amd64.AppImage.sig"
          if [ -f "$APPIMAGE_SIG" ]; then
            SIG=$(tr -d '\n' < "$APPIMAGE_SIG")
            echo '    "linux-x86_64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/linux-AI-Job-Hunter_${RAW_VERSION}_amd64.AppImage\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::Linux AppImage signature not found at $APPIMAGE_SIG"
          fi

          # macOS — arch-specific .app.tar.gz bundles. Each arch build produces
          # its own (non-universal) bundle, so each updater target must point at
          # the matching file + signature. Names come from the macOS
          # disambiguation step in the build job (-intel / -apple-silicon).
          MAC_INTEL_SIG="temp/macos-AI-Job-Hunter-intel.app.tar.gz.sig"
          if [ -f "$MAC_INTEL_SIG" ]; then
            SIG=$(tr -d '\n' < "$MAC_INTEL_SIG")
            echo '    "darwin-x86_64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/macos-AI-Job-Hunter-intel.app.tar.gz\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::macOS Intel app bundle signature not found at $MAC_INTEL_SIG"
          fi

          MAC_ARM_SIG="temp/macos-AI-Job-Hunter-apple-silicon.app.tar.gz.sig"
          if [ -f "$MAC_ARM_SIG" ]; then
            SIG=$(tr -d '\n' < "$MAC_ARM_SIG")
            echo '    "darwin-aarch64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/macos-AI-Job-Hunter-apple-silicon.app.tar.gz\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::macOS Apple Silicon app bundle signature not found at $MAC_ARM_SIG"
          fi

          # Close JSON (remove trailing comma and close)
          sed -i '$ s/,$//' latest.json
          echo '  }' >> latest.json
          echo '}' >> latest.json

          cat latest.json
          echo "::endgroup::"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload latest.json to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 Append grouped Downloads table to release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "::group::Appending per-platform Downloads table to $VERSION notes"
          RAW="${VERSION#v}"
          URL="https://github.com/saeedkolivand/ai-job-hunter-app/releases/download/$VERSION"
          # Strip any prior block (idempotent) then re-append a fresh one.
          BODY="$(gh release view "$VERSION" --json body -q .body)"
          BODY="$(printf '%s' "$BODY" | sed '/<!-- downloads:start -->/,/<!-- downloads:end -->/d')"
          TABLE="$(cat <<EOF
          <!-- downloads:start -->
          ## 📥 Downloads

          | Platform | Get it |
          |----------|--------|
          | 🪟 Windows | [Installer (.exe)]($URL/windows-AI-Job-Hunter_${RAW}_x64-setup.exe) · [MSI]($URL/windows-AI-Job-Hunter_${RAW}_x64_en-US.msi) |
          | 🍎 macOS (Apple Silicon) | [.dmg]($URL/macos-AI-Job-Hunter_${RAW}_aarch64-apple-silicon.dmg) |
          | 🍎 macOS (Intel) | [.dmg]($URL/macos-AI-Job-Hunter_${RAW}_x64-intel.dmg) |
          | 🐧 Linux | [AppImage]($URL/linux-AI-Job-Hunter_${RAW}_amd64.AppImage) · [.deb]($URL/linux-AI-Job-Hunter_${RAW}_amd64.deb) · [.rpm]($URL/linux-AI-Job-Hunter-${RAW}-1.x86_64.rpm) |
          | 🧩 Browser extension | [Chrome (.zip)]($URL/ai-job-hunter-extension-chrome-${VERSION}.zip) · [Firefox (.zip)]($URL/ai-job-hunter-extension-firefox-${VERSION}.zip) |

          _Installed apps auto-update — no need to re-download for new versions. The browser extension installs from its .zip (load unpacked / store upload)._
          <!-- downloads:end -->
          EOF
          )"
          gh release edit "$VERSION" --notes "$BODY"$'\n\n'"$TABLE"
          echo "::endgroup::"

  update-cask:
    name: 🍺 Update Homebrew Cask
    # Pins the cask to the just-built dmgs (version + per-arch sha256). Runs after
    # the build because that's the only point the dmgs — and their hashes — exist;
    # deliberately NOT in the push-only release job, which runs before any build
    # (so there'd be nothing to hash, and bumping the version there would point
    # the cask at dmgs that never ship). Reads each asset's
    # sha256 digest straight from the GitHub API (no download) and commits the
    # refreshed cask back to main. Skipped on the push path (build is manual).
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # `gh release view` only reads; the cask commit is pushed over the
    # RELEASE_DEPLOY_KEY (SSH), not the GITHUB_TOKEN — so read is enough.
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: 🏷️ Resolve Release Version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(git tag --sort=-version:refname | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "::error::No release tags found"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🍺 Sync cask to the built dmgs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "::group::Reading dmg sha256 digests for $VERSION"
          arm="$(gh release view "$VERSION" --json assets \
            -q '.assets[] | select(.name | endswith("aarch64-apple-silicon.dmg")) | .digest' | sed 's/^sha256://')"
          intel="$(gh release view "$VERSION" --json assets \
            -q '.assets[] | select(.name | endswith("x64-intel.dmg")) | .digest' | sed 's/^sha256://')"
          if [ -z "$arm" ] || [ -z "$intel" ]; then
            echo "::warning::dmg digests not found for $VERSION — skipping cask update"
            exit 0
          fi
          node scripts/sync-cask.cjs "${VERSION#v}" "$arm" "$intel"
          echo "::endgroup::"

      - name: 📤 Commit cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/ai-job-hunter.rb; then
            echo "Cask already up to date."
            exit 0
          fi
          git add Casks/ai-job-hunter.rb
          git commit -m "chore: sync homebrew cask to ${VERSION} [skip ci]"
          git push git@github.com:saeedkolivand/ai-job-hunter-app.git HEAD:main
