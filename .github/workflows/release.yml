name: 🚀 Release

# ──────────────────────────────────────────────────────────────────────
# Release Pipeline
# ──────────────────────────────────────────────────────────────────────
# Purpose: Automated semantic release and cross-platform Tauri app builds
# Triggers: push to main, manual workflow_dispatch
# Jobs:
#   - release: Determine version and create GitHub release
#   - sync-version-files: Commit tracked version files for the published release
#   - build: Build Tauri apps for Windows, Linux, and macOS
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 🏷️ Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HUSKY: 0
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: 📝 Release Summary
        if: always()
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Published | ${{ steps.semantic.outputs.new_release_published == 'true' && '✅ Yes' || '❌ No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.semantic.outputs.new_release_version || 'N/A' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Semantic Release Docs](https://semantic-release.gitbook.io/semantic-release/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "::endgroup::"

  sync-version-files:
    name: 🔖 Sync Version Files
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      released: ${{ needs.release.outputs.released }}
      version: ${{ needs.release.outputs.version }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: � Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: � Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 🔖 Sync Version Files
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          echo "::group::Syncing tracked version files"
          node scripts/sync-tauri-version.cjs ${{ needs.release.outputs.version }}
          echo "::endgroup::"

      - name: 📤 Commit Version Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- \
            package.json \
            apps/tauri/package.json \
            apps/tauri/src-tauri/Cargo.toml \
            apps/tauri/src-tauri/tauri.conf.json; then
            echo "Version files are already synced."
            exit 0
          fi

          git add \
            package.json \
            apps/tauri/package.json \
            apps/tauri/src-tauri/Cargo.toml \
            apps/tauri/src-tauri/tauri.conf.json
          git commit -m "chore: sync version files to v${{ needs.release.outputs.version }} [skip ci]"
          git push git@github.com:saeedkolivand/ai-job-hunter-assistant-app.git HEAD:main

  build:
    name: 🏗️ Build Tauri Apps
    needs: sync-version-files
    if: needs.sync-version-files.outputs.released == 'true'

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.sync-version-files.outputs.version }}
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 💾 Restore Turbo Cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🐧 Install Linux Dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          version: latest

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: 📥 Install Dependencies
        run: |
          echo "::group::Installing dependencies"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      - name: 🔖 Sync Release Version
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
        run: |
          echo "::group::Syncing Tauri release metadata"
          node scripts/sync-tauri-version.cjs ${{ needs.sync-version-files.outputs.version }}
          echo "::endgroup::"

          echo "::group::Verifying public key"
          echo "Public key configured in tauri.conf.json:"
          cat apps/tauri/src-tauri/tauri.conf.json | grep -A 1 '"pubkey"'
          echo "::endgroup::"

      - name: 🔨 Build Workspace
        run: |
          echo "::group::Building workspace packages"
          pnpm build:packages
          echo "::endgroup::"

      - name: Add Intel Target (macOS only)
        if: runner.os == 'macOS'
        run: |
          echo "::group::Adding Intel target"
          rustup target add x86_64-apple-darwin
          echo "::endgroup::"

      - name: 🔧 Add ARM64 Target (macOS only)
        if: runner.os == 'macOS'
        run: |
          echo "::group::Adding ARM64 target"
          rustup target add aarch64-apple-darwin
          echo "::endgroup::"

      - name: 🏗️ Build Tauri Application
        id: tauri-build
        continue-on-error: true
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "::group::Building Tauri application"
          if [ "${{ runner.os }}" == "macOS" ]; then
            # Build Intel
            pnpm --filter @ajh/tauri tauri build --target x86_64-apple-darwin
            # Build Apple Silicon
            pnpm --filter @ajh/tauri tauri build --target aarch64-apple-darwin
          else
            # Build for current platform (Linux or Windows)
            pnpm --filter @ajh/tauri tauri build
          fi
          echo "::endgroup::"

      - name: ❌ Check for Build Failures
        if: steps.tauri-build.outcome == 'failure'
        run: |
          echo "::error::Tauri build failed on ${{ matrix.platform }}. Please review the build output above."
          exit 1

      - name: 🏷️ Normalize Artifact Names
        if: success()
        shell: bash
        run: |
          echo "::group::Normalizing artifact names (replacing spaces with dashes)"
          # Tauri keeps spaces from productName in artifact filenames. Replace spaces
          # with dashes so URLs in latest.json don't need encoding and the manifest
          # generator can match deterministic names across all platforms.
          if [ -d apps/tauri/src-tauri/target ]; then
            find apps/tauri/src-tauri/target -type f -name '* *' -print0 | \
              while IFS= read -r -d '' f; do
                dir="$(dirname "$f")"
                base="$(basename "$f")"
                new="${base// /-}"
                if [ "$base" != "$new" ]; then
                  mv "$f" "$dir/$new"
                  echo "Renamed: $base -> $new"
                fi
              done
          fi
          echo "::endgroup::"

      - name: 🏷️ Disambiguate macOS DMG Architecture
        if: runner.os == 'macOS' && success()
        shell: bash
        run: |
          echo "::group::Tagging macOS DMGs with architecture suffix"
          shopt -s nullglob
          for f in apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg; do
            mv "$f" "${f%.dmg}-intel.dmg"
            echo "Renamed (intel): $(basename "$f")"
          done
          for f in apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg; do
            mv "$f" "${f%.dmg}-apple-silicon.dmg"
            echo "Renamed (apple-silicon): $(basename "$f")"
          done
          echo "::endgroup::"

      - name: Upload Release Assets
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.sync-version-files.outputs.version }}
          # Tauri only emits .sig files for NSIS, AppImage, and macOS .app.tar.gz
          # bundles (the targets the auto-updater consumes). MSI/DEB/RPM never
          # produce .sig artifacts so they're not listed.
          files: |
            apps/tauri/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri/src-tauri/target/release/bundle/nsis/*.sig
            apps/tauri/src-tauri/target/release/bundle/msi/*.msi
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            apps/tauri/src-tauri/target/release/bundle/deb/*.deb
            apps/tauri/src-tauri/target/release/bundle/rpm/*.rpm
            apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ matrix.platform }}-${{ github.run_id }}
          # Restrict to logs and bundler output to avoid uploading multi-GB
          # compiled artifacts. The full target/ tree is too large for CI.
          path: |
            apps/tauri/src-tauri/target/release/bundle/**
            apps/tauri/src-tauri/target/**/*.log
            apps/tauri/src-tauri/target/**/output
          retention-days: 7
          compression-level: 9
          if-no-files-found: ignore

      - name: 📝 Job Summary
        if: always()
        shell: bash
        run: |
          echo "## 🏗️ Tauri Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ steps.tauri-build.outcome == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`v${{ needs.sync-version-files.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Environment" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: $(pnpm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tauri-build.outcome }}" == "failure" ]; then
            echo "### 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "Build logs uploaded: \`build-logs-${{ matrix.platform }}-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "### 🔗 Resources" >> $GITHUB_STEP_SUMMARY
          echo "- [Tauri Build Guide](https://tauri.app/v1/guides/building/)" >> $GITHUB_STEP_SUMMARY

      - name: 🔍 Debug Environment on Failure
        if: failure()
        run: |
          echo "::group::Environment Variables"
          echo "Node Version: $(node --version)"
          echo "Rust Version: $(rustc --version)"
          echo "pnpm Version: $(pnpm --version)"
          echo "Runner OS: ${{ runner.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "::endgroup::"

  generate-update-manifest:
    name: 📝 Generate Update Manifest
    needs: [sync-version-files, build]
    if: needs.sync-version-files.outputs.released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.sync-version-files.outputs.version }}
          fetch-depth: 1

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: 🏷️ Generate latest.json
        run: |
          echo "::group::Generating latest.json"
          VERSION="${{ needs.sync-version-files.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Start JSON structure
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/saeedkolivand/ai-job-hunter-assistant-app/releases/tag/v$VERSION for details",
            "pub_date": "$PUB_DATE",
            "platforms": {
          EOF

          # Download all release assets to inspect
          gh release download "v$VERSION" --dir temp/ || true

          # Debug: list all downloaded files
          echo "::group::All downloaded release files"
          ls -la temp/ || echo "temp directory is empty"
          echo "::endgroup::"

          # Filenames below match the normalized names produced by the
          # "Normalize Artifact Names" step in the build job (spaces -> dashes).
          BASE_URL="https://github.com/saeedkolivand/ai-job-hunter-assistant-app/releases/download/v$VERSION"

          # Windows (NSIS is the primary updater target)
          NSIS_SIG="temp/AI-Job-Hunter-Assistant_${VERSION}_x64-setup.exe.sig"
          if [ -f "$NSIS_SIG" ]; then
            SIG=$(tr -d '\n' < "$NSIS_SIG")
            echo '    "windows-x86_64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/AI-Job-Hunter-Assistant_${VERSION}_x64-setup.exe\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::Windows NSIS signature not found at $NSIS_SIG"
          fi

          # Linux (AppImage is the primary updater target)
          APPIMAGE_SIG="temp/AI-Job-Hunter-Assistant_${VERSION}_amd64.AppImage.sig"
          if [ -f "$APPIMAGE_SIG" ]; then
            SIG=$(tr -d '\n' < "$APPIMAGE_SIG")
            echo '    "linux-x86_64": {' >> latest.json
            echo "      \"signature\": \"$SIG\"," >> latest.json
            echo "      \"url\": \"${BASE_URL}/AI-Job-Hunter-Assistant_${VERSION}_amd64.AppImage\"" >> latest.json
            echo '    },' >> latest.json
          else
            echo "::warning::Linux AppImage signature not found at $APPIMAGE_SIG"
          fi

          # macOS (single .app.tar.gz served for both architectures)
          MAC_SIG="temp/AI-Job-Hunter-Assistant.app.tar.gz.sig"
          if [ -f "$MAC_SIG" ]; then
            SIG=$(tr -d '\n' < "$MAC_SIG")
            for triple in darwin-x86_64 darwin-aarch64; do
              echo "    \"$triple\": {" >> latest.json
              echo "      \"signature\": \"$SIG\"," >> latest.json
              echo "      \"url\": \"${BASE_URL}/AI-Job-Hunter-Assistant.app.tar.gz\"" >> latest.json
              echo '    },' >> latest.json
            done
          else
            echo "::warning::macOS app bundle signature not found at $MAC_SIG"
          fi

          # Close JSON (remove trailing comma and close)
          sed -i '$ s/,$//' latest.json
          echo '  }' >> latest.json
          echo '}' >> latest.json

          cat latest.json
          echo "::endgroup::"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload latest.json to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.sync-version-files.outputs.version }}
          files: latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
