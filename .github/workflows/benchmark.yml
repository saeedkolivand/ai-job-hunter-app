name: 📈 Benchmarks (advisory)

# ──────────────────────────────────────────────────────────────────────
# Tracks export render hot-path performance (request → PDF/DOCX bytes) over
# time — the most performance-sensitive, user-visible path in the app.
#   - push to main : record the baseline (history committed to `landing/benchmarks` on main)
#   - pull_request : compare against the baseline; comment on regressions
# ADVISORY — never fails the build (comment-only) until thresholds are tuned.
# Self-contained: history lives under `landing/benchmarks` on main, so the
# generated benchmark dashboard is published with the landing page artifact.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'apps/tauri/src-tauri/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/tauri/src-tauri/**'
      - '.github/workflows/benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: 📈 Export render
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Commit benchmark history to `landing/benchmarks` on main (push-to-main runs only).
      contents: write
      # Comment on a PR when a result regresses past the threshold.
      pull-requests: write
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          # Full history + the release deploy key so the push-to-main run can
          # commit the refreshed benchmark dashboard back to main (mirrors the
          # release cask/version-sync jobs). Default ref keeps PR runs on PR code.
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: 🦀 Setup Rust
        uses: ./.github/actions/setup-rust

      # criterion's `--output-format bencher` emits the libtest bench format that
      # github-action-benchmark parses with `tool: cargo`.
      - name: 📈 Run export benchmarks
        working-directory: apps/tauri/src-tauri
        run: cargo bench --bench export_render -- --output-format bencher | tee output.txt

      - name: 📊 Store result & alert on regression (advisory)
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        # Advisory infra: never let a benchmark hiccup show red on a PR.
        continue-on-error: true
        with:
          name: Export render
          tool: cargo
          output-file-path: apps/tauri/src-tauri/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Store history in the landing artifact on main.
          gh-pages-branch: main
          benchmark-data-dir-path: landing/benchmarks
          # The action's own auto-push runs `git fetch origin main:main`, which
          # `fatal: refusing to fetch into branch 'main' checked out` — main is
          # already the working tree. So skip its fetch and never let it push.
          # With auto-push:false the action still makes its OWN local commit
          # (it does NOT leave the change in the working tree); the step below
          # pushes that commit, the same way the release cask job pushes.
          skip-fetch-gh-pages: true
          auto-push: false
          # PRs: leave a comment when a benchmark regresses past the threshold.
          comment-on-alert: true
          alert-threshold: '150%'
          # Advisory: never fail the job — comment-only until thresholds are tuned.
          fail-on-alert: false
          alert-comment-cc-users: '@saeedkolivand'

      # Commit the refreshed dashboard back to main, exactly like the release
      # cask/version-sync jobs (SSH deploy key + [skip ci]). Runs on push AND
      # manual workflow_dispatch (so "Run workflow" can seed/refresh the baseline)
      # but NOT on PRs, which stay compare-only. [skip ci] keeps this commit from
      # re-triggering any workflow, so Pages is kicked explicitly in the next step.
      - name: 📤 Commit benchmark data
        id: commit
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # github-action-benchmark makes its OWN local commit even with
          # auto-push:false — it does NOT leave the change in the working tree,
          # so `git status --porcelain` is always clean here. Detect the
          # action's unpushed commit by comparing HEAD against origin/main.
          if [ -z "$(git log origin/main..HEAD --oneline)" ]; then
            echo "Benchmark data unchanged — nothing to push."
            exit 0
          fi
          # Re-message the action's commit with [skip ci] so the data push to
          # main does not re-trigger CI; pages.yml is kicked explicitly below.
          git commit --amend -m "chore: update export benchmark data [skip ci]"
          git push git@github.com:saeedkolivand/ai-job-hunter-assistant-app.git HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # [skip ci] on the data commit stops pages.yml from auto-running, so kick
      # it explicitly to publish the refreshed dashboard. Uses the PAT
      # (secrets.GH_TOKEN), NOT the default GITHUB_TOKEN — a workflow_dispatch
      # made with GITHUB_TOKEN is silently dropped by GitHub's recursion guard.
      # Only fires when a commit actually landed.
      - name: 🌐 Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh workflow run pages.yml --ref main
