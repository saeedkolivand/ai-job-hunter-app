name: Release Orchestration

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  determine-release:
    name: Determine Release Version

    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          # GITHUB_TOKEN has contents:write which is sufficient for creating
          # tags and GitHub Releases via the API. @semantic-release/git has
          # been removed so no direct push to main is attempted.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord Release Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Release Failed'
          description: |
            Release orchestration failed.

            Repository:
            ${{ github.repository }}

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xED4245

  # ── Tauri builds ─────────────────────────────────────────────────────────────
  #
  # Prerequisites (set these GitHub repository secrets before first release):
  #
  #   TAURI_SIGNING_PRIVATE_KEY         — contents of ~/.tauri/ajh.key
  #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the key (empty string if none)
  #   TAURI_SIGNING_PUBLIC_KEY          — contents of ~/.tauri/ajh.key.pub
  #
  # Generate the key pair with:
  #   bash scripts/generate-tauri-signing-key.sh
  #
  # The sync-tauri-version.js script injects TAURI_SIGNING_PUBLIC_KEY into
  # tauri.conf.json before the build so signed artifacts use the real key.

  build-tauri-windows:
    name: Build Windows Application (Tauri)

    needs: determine-release

    if: needs.determine-release.outputs.released == 'true'

    runs-on: windows-latest

    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-tauri-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-tauri-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build:packages

      - name: Sync Tauri Version and Inject Signing Key
        run: node scripts/sync-tauri-version.cjs ${{ needs.determine-release.outputs.version }}
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.determine-release.outputs.version }}
          releaseName: AI Job Hunter v${{ needs.determine-release.outputs.version }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          projectPath: ./apps/tauri

      - name: Upload Windows .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ needs.determine-release.outputs.version }}"
          $sigs = Get-ChildItem -Recurse -Filter "*.sig" apps/tauri/src-tauri/target 2>$null
          foreach ($sig in $sigs) {
            Write-Host "Uploading $($sig.Name)"
            gh release upload $tag $sig.FullName --repo ${{ github.repository }} --clobber
          }

  build-tauri-macos:
    name: Build macOS Application (Tauri)

    needs: determine-release

    if: needs.determine-release.outputs.released == 'true'

    runs-on: macos-latest

    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-tauri-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-tauri-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build:packages

      - name: Sync Tauri Version and Inject Signing Key
        run: node scripts/sync-tauri-version.cjs ${{ needs.determine-release.outputs.version }}
        env:
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Build Tauri App (macOS universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.determine-release.outputs.version }}
          releaseName: AI Job Hunter v${{ needs.determine-release.outputs.version }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          projectPath: ./apps/tauri
          args: --target universal-apple-darwin

      - name: Upload macOS .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.determine-release.outputs.version }}"
          find apps/tauri/src-tauri/target -name "*.sig" 2>/dev/null | while read sig; do
            echo "Uploading $(basename $sig)"
            gh release upload "$TAG" "$sig" --repo "${{ github.repository }}" --clobber
          done

  generate-updater-manifest:
    name: Generate Updater Manifest (latest.json)

    needs:
      - determine-release
      - build-tauri-windows
      - build-tauri-macos

    if: needs.determine-release.outputs.released == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.determine-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          TAG="v${VERSION}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fetch release notes from the GitHub release body
          NOTES=$(gh release view "${TAG}" --repo "${REPO}" --json body -q '.body' 2>/dev/null || echo "")

          # Download all .sig files from the release
          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "*.sig" \
            --dir /tmp/sigs \
            2>/dev/null || true

          ls /tmp/sigs/ 2>/dev/null || echo "No .sig files found"

          # Read signatures (empty string if file not present)
          read_sig() {
            local f="$1"
            if [ -f "/tmp/sigs/${f}" ]; then
              cat "/tmp/sigs/${f}"
            else
              echo ""
            fi
          }

          MACOS_SIG=$(read_sig "AI.Job.Hunter.Assistant_universal.app.tar.gz.sig")
          WIN_NSIS_SIG=$(read_sig "AI.Job.Hunter.Assistant_${VERSION}_x64-setup.exe.sig")
          WIN_MSI_SIG=$(read_sig "AI.Job.Hunter.Assistant_${VERSION}_x64_en-US.msi.zip.sig")

          # Prefer NSIS sig for Windows; fall back to MSI
          WIN_SIG="${WIN_NSIS_SIG:-$WIN_MSI_SIG}"
          WIN_URL="${BASE_URL}/AI.Job.Hunter.Assistant_${VERSION}_x64-setup.exe"
          if [ -z "${WIN_SIG}" ] && [ -n "${WIN_MSI_SIG}" ]; then
            WIN_SIG="${WIN_MSI_SIG}"
            WIN_URL="${BASE_URL}/AI.Job.Hunter.Assistant_${VERSION}_x64_en-US.msi"
          fi

          # Build platforms object — include platforms with or without signatures
          PLATFORMS="{}"

          # Always include macOS if the artifact exists (with or without signature)
          if [ -n "${MACOS_SIG}" ]; then
            PLATFORMS=$(echo "${PLATFORMS}" | MACOS_SIG="${MACOS_SIG}" node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              d['darwin-universal'] = {
                signature: process.env.MACOS_SIG,
                url: '${BASE_URL}/AI.Job.Hunter.Assistant_universal.app.tar.gz'
              };
              process.stdout.write(JSON.stringify(d));
            ")
          else
            # Fallback: include macOS without signature (for unsigned builds)
            PLATFORMS=$(echo "${PLATFORMS}" | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              d['darwin-universal'] = {
                signature: '',
                url: '${BASE_URL}/AI.Job.Hunter.Assistant_universal.app.tar.gz'
              };
              process.stdout.write(JSON.stringify(d));
            ")
          fi

          # Always include Windows if the artifact exists (with or without signature)
          if [ -n "${WIN_SIG}" ]; then
            PLATFORMS=$(echo "${PLATFORMS}" | WIN_SIG="${WIN_SIG}" node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              d['windows-x86_64'] = {
                signature: process.env.WIN_SIG,
                url: '${WIN_URL}'
              };
              process.stdout.write(JSON.stringify(d));
            ")
          else
            # Fallback: include Windows without signature (for unsigned builds)
            PLATFORMS=$(echo "${PLATFORMS}" | node -e "
              const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              d['windows-x86_64'] = {
                signature: '',
                url: '${BASE_URL}/AI.Job.Hunter.Assistant_${VERSION}_x64-setup.exe'
              };
              process.stdout.write(JSON.stringify(d));
            ")
          fi

          # Generate latest.json
          NOTES="${NOTES}" PLATFORMS="${PLATFORMS}" node -e "
            const manifest = {
              version: '${VERSION}',
              notes: process.env.NOTES || '',
              pub_date: '${PUB_DATE}',
              platforms: JSON.parse(process.env.PLATFORMS)
            };
            require('fs').writeFileSync('/tmp/latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated latest.json:');
            console.log(JSON.stringify(manifest, null, 2));
          "

          # Upload latest.json to the release (overwrite if exists)
          gh release upload "${TAG}" \
            --repo "${REPO}" \
            /tmp/latest.json \
            --clobber

          echo "latest.json uploaded to ${TAG}"

  notify-release-success:
    name: Notify Release Success

    needs:
      - determine-release
      - build-tauri-windows
      - build-tauri-macos
      - generate-updater-manifest

    if: needs.determine-release.outputs.released == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord Success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Production Release Published'
          description: |
            Version v${{ needs.determine-release.outputs.version }} was released successfully.
            Tauri artifacts and updater manifest uploaded to GitHub Releases.

            Repository:
            ${{ github.repository }}

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0x57F287
