name: Release Orchestration

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine-release:
    name: Determine Release Version
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      manual_version: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git Authentication
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Run Semantic Release
        id: semantic
        if: github.event_name != 'workflow_dispatch'
        uses: cycjimmy/semantic-release-action@v4
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}

      - name: Set Manual Version
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "new_release_published=true" >> $GITHUB_OUTPUT
          echo "new_release_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

  build-tauri-windows:
    name: Build Windows
    needs: determine-release
    if: needs.determine-release.outputs.new_release_published == 'true'

    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.determine-release.outputs.new_release_version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        run: pnpm --filter !@ajh/tauri build

      - name: Build Windows App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @ajh/tauri tauri build

      - name: Generate Checksums
        working-directory: apps/tauri/src-tauri/target/release/bundle
        run: |
          Get-ChildItem -Recurse -Include *.exe,*.msi | ForEach-Object {
            $checksum = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            "$checksum  $($_.Name)" | Out-File -Append checksums.txt -Encoding utf8
          }

      - name: Upload Windows Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-release.outputs.new_release_version }}
          files: |
            apps/tauri/src-tauri/target/release/bundle/nsis/*.exe
            apps/tauri/src-tauri/target/release/bundle/msi/*.msi
            apps/tauri/src-tauri/target/release/bundle/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-tauri-macos:
    name: Build macOS
    needs: determine-release
    if: needs.determine-release.outputs.new_release_published == 'true'

    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.determine-release.outputs.new_release_version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        run: pnpm --filter !@ajh/tauri build

      - name: Build macOS App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @ajh/tauri tauri build

      - name: Generate Checksums
        working-directory: apps/tauri/src-tauri/target/release/bundle
        run: |
          shasum -a 256 dmg/*.dmg > checksums.txt

      - name: Upload macOS Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-release.outputs.new_release_version }}
          files: |
            apps/tauri/src-tauri/target/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/release/bundle/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true

  build-tauri-linux:
    name: Build Linux
    needs: determine-release
    if: needs.determine-release.outputs.new_release_published == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.determine-release.outputs.new_release_version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        env:
          NODE_OPTIONS: --no-deprecation
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        run: pnpm --filter !@ajh/tauri build

      - name: Build Linux App
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm --filter @ajh/tauri tauri build

      - name: Generate Checksums
        working-directory: apps/tauri/src-tauri/target/release/bundle
        run: |
          shasum -a 256 appimage/*.AppImage > checksums.txt

      - name: Upload Linux Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-release.outputs.new_release_version }}
          files: |
            apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/tauri/src-tauri/target/release/bundle/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [determine-release, build-tauri-windows, build-tauri-macos, build-tauri-linux]
    if: always() && secrets.DISCORD_WEBHOOK_URL != ''
    steps:
      - name: Notify Success
        if: needs.build-tauri-windows.result == 'success' && needs.build-tauri-macos.result == 'success' && needs.build-tauri-linux.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Release Published'
          description: |
            Version v${{ needs.determine-release.outputs.new_release_version }} has been released.

            Repository: ${{ github.repository }}
            Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.determine-release.outputs.new_release_version }}
          color: 0x57F287

      - name: Notify Failure
        if: |
          needs.build-tauri-windows.result == 'failure' ||
          needs.build-tauri-macos.result == 'failure' ||
          needs.build-tauri-linux.result == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Release Failed'
          description: |
            Release v${{ needs.determine-release.outputs.new_release_version }} failed to build.

            Repository: ${{ github.repository }}
            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xED4245
