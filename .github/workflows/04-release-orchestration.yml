name: Release Orchestration

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  determine-release:
    name: Determine Release Version

    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          # RELEASE_TOKEN must be a PAT (classic, repo scope) from the repo owner.
          # The GITHUB_TOKEN cannot bypass the main branch ruleset on personal repos
          # because Integration bypass actors are org-only. A PAT from the owner
          # inherits the bypass (current_user_can_bypass: always).
          #
          # To create: GitHub → Settings → Developer settings → Personal access tokens
          #   → Tokens (classic) → Generate new token → scope: repo → copy
          # To add: Repository → Settings → Secrets → Actions → New secret
          #   → Name: RELEASE_TOKEN → Value: <your PAT>
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Notify Discord Release Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Release Failed'
          description: |
            Release orchestration failed.

            Repository:
            ${{ github.repository }}

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xED4245

  build-windows:
    name: Build Windows Application

    needs: determine-release

    if: needs.determine-release.outputs.released == 'true'

    runs-on: windows-latest

    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Restore Electron Cache
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build:packages

      - name: Sync Desktop App Version
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('apps/desktop/package.json'));p.version='${{ needs.determine-release.outputs.version }}';fs.writeFileSync('apps/desktop/package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Build Desktop App
        run: pnpm --filter @ajh/desktop build

      - name: Package Windows
        run: pnpm --filter @ajh/desktop package -- --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Application

    needs: determine-release

    if: needs.determine-release.outputs.released == 'true'

    runs-on: macos-latest

    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Restore Electron Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build:packages

      - name: Sync Desktop App Version
        run: node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('apps/desktop/package.json'));p.version='${{ needs.determine-release.outputs.version }}';fs.writeFileSync('apps/desktop/package.json',JSON.stringify(p,null,2)+'\n');"

      - name: Build Desktop App
        run: pnpm --filter @ajh/desktop build

      - name: Package macOS
        run: pnpm --filter @ajh/desktop package -- --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-release-success:
    name: Notify Release Success

    needs:
      - determine-release
      - build-windows
      - build-macos

    if: needs.determine-release.outputs.released == 'true'

    runs-on: ubuntu-latest

    steps:
      - name: Notify Discord Success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Production Release Published'
          description: |
            Version v${{ needs.determine-release.outputs.version }} was released successfully.

            Repository:
            ${{ github.repository }}

            Workflow:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0x57F287
