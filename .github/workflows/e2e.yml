name: 🎭 E2E

# Browser end-to-end tests: drive the renderer in Chromium against the in-memory
# mock client (no Tauri/native build required). Kept separate from the main CI
# pipeline so a browser regression is easy to spot and does not slow type/lint.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: 🎭 Playwright (mock UI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🔨 Build Shared Packages
        run: |
          echo "::group::Building shared packages"
          pnpm build:packages
          echo "::endgroup::"

      - name: 🎭 Install Playwright Chromium
        run: |
          echo "::group::Installing Playwright Chromium"
          pnpm --filter @ajh/tauri exec playwright install --with-deps chromium
          echo "::endgroup::"

      - name: 🎭 Run E2E Tests
        run: |
          echo "::group::Running E2E tests"
          pnpm --filter @ajh/tauri test:e2e
          echo "::endgroup::"

      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/tauri/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
