name: 🚀 CI Pipeline

# ──────────────────────────────────────────────────────────────────────
# Continuous Integration Pipeline
# ──────────────────────────────────────────────────────────────────────
# Runs on: pull_request to main, push to any branch except main
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main

  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────
# Jobs
# ──────────────────────────────────────────────────────────────────────
jobs:
  lint-format:
    name: ✨ Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🔍 Run ESLint
        run: pnpm lint:strict

      - name: 🎨 Check Formatting
        run: pnpm format:check

  # ──────────────────────────────────────────────────────────────────────
  # Type Check
  # ──────────────────────────────────────────────────────────────────────
  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🔍 Run Type Check
        run: pnpm typecheck

  # ──────────────────────────────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────────────────────────────
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🐧 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🧪 Run Tests
        run: pnpm test

      - name: 🦀 Cargo Test
        working-directory: apps/tauri/src-tauri
        run: cargo test --all-features

  # ──────────────────────────────────────────────────────────────────────
  # Build Verification
  # ──────────────────────────────────────────────────────────────────────
  build-verification:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🐧 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🦀 Cargo Check
        working-directory: apps/tauri/src-tauri
        run: cargo check --all-targets --all-features

      - name: 🏗️ Verify Production Build
        run: pnpm build

  # ──────────────────────────────────────────────────────────────────────
  # Quality Checks
  # ──────────────────────────────────────────────────────────────────────
  quality-checks:
    name: 🔬 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 🐧 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: 🦀 Cargo Clippy
        working-directory: apps/tauri/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
