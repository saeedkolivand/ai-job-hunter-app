name: 🚀 CI Pipeline

# ╔════════════════════════════════════════════════════════════╗
# ║                    ⚡ Continuous Integration              ║
# ╚════════════════════════════════════════════════════════════╝

on:
  pull_request:
    branches:
      - main

  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.1.3

jobs:
  lint-format:
    name: ✨ Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🔍 Run ESLint
        run: pnpm lint:strict

      - name: 🎨 Check Formatting
        run: pnpm format:check

      - name: ✅ Lint & Format Passed
        run: echo "✨ Code quality checks passed successfully!" >> $GITHUB_STEP_SUMMARY

  type-check:
    name: 🧠 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🧠 Run Type Check
        run: pnpm typecheck

      - name: ✅ Type Check Passed
        run: echo "🧠 TypeScript validation completed successfully!" >> $GITHUB_STEP_SUMMARY

  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🐧 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: 💾 Restore Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build Shared Packages
        run: pnpm build:packages

      - name: 🧪 Run Tests
        run: pnpm test

      - name: 🦀 Cargo Test
        working-directory: apps/tauri/src-tauri
        run: cargo test --all-features

      - name: ✅ Tests Passed
        run: echo "🧪 All tests completed successfully!" >> $GITHUB_STEP_SUMMARY
