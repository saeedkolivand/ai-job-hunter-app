name: 🚀 CI Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 11.1.3

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run ESLint
        run: pnpm lint:strict

      - name: 🎨 Check Formatting
        run: pnpm format:check

      - name: ✅ Summary
        run: echo "Lint & Format passed" >> $GITHUB_STEP_SUMMARY

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧠 Run Type Check
        run: pnpm typecheck

      - name: ✅ Summary
        run: echo "Type Check passed" >> $GITHUB_STEP_SUMMARY

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run Tests
        run: pnpm test

      - name: ✅ Summary
        run: echo "Tests passed" >> $GITHUB_STEP_SUMMARY

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔨 Verify Build
        run: pnpm build

      - name: ✅ Summary
        run: echo "Build Verification passed" >> $GITHUB_STEP_SUMMARY

  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Run Audit
        run: pnpm audit --audit-level high || true

      - name: ✅ Summary
        run: echo "Quality Checks completed" >> $GITHUB_STEP_SUMMARY
