name: 🧹 Workflow Lint

# ──────────────────────────────────────────────────────────────────────
# Security-audits the GitHub Actions workflows & composite actions, and keeps
# the workflow catalog honest. Runs only when CI config changes. zizmor is
# advisory (prints findings to the log, never blocks). actionlint now runs
# in-PR via CodeRabbit (.coderabbit.yaml tools.actionlint), so the former
# reviewdog actionlint lane was retired. The catalog job DOES fail on drift: if
# .github/workflows/README.md or the root README badges are stale, regenerate
# with `pnpm gen:workflows`. (workflow-lint is not a required check, so a
# failure here still never blocks merge — it is a visible nudge.)
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/gen-workflow-catalog.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: 🛡️ zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: 🐍 Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      # Advisory: prints findings (incl. unpinned actions, injection risks) but
      # never fails the build yet. SHA-pinning lands in a follow-up PR.
      - name: 🛡️ Run zizmor
        run: uvx zizmor .github/workflows .github/actions || true

  catalog:
    name: 📚 Workflow Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      # Regenerates the catalog + README badges from the workflow files and fails
      # if the committed copies are stale → run `pnpm gen:workflows` and commit.
      - name: 📚 Verify the workflow catalog is current
        run: pnpm gen:workflows:check
