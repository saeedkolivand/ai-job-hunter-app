name: 🧹 Workflow Lint

# ──────────────────────────────────────────────────────────────────────
# Security-audits the GitHub Actions workflows & composite actions, and keeps
# the workflow catalog honest. Runs only when CI config changes. zizmor blocks
# on HIGH-severity findings (lower severities are advisory). actionlint now runs
# in-PR via CodeRabbit (.coderabbit.yaml tools.actionlint), so the former
# reviewdog actionlint lane was retired. The catalog job DOES fail on drift: if
# .github/workflows/README.md or the root README badges are stale, regenerate
# with `pnpm gen:workflows`. (workflow-lint is not a required check, so a
# failure here still never blocks merge — it is a visible nudge.)
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/gen-workflow-catalog.mjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: 🛡️ zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: 🐍 Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      # Blocking at HIGH severity (actions are SHA-pinned; the pin policy and
      # documented suppressions live in .github/zizmor.yml). Findings below
      # high are filtered here — run zizmor locally for the full report.
      - name: 🛡️ Run zizmor
        run: uvx zizmor --min-severity high .github/workflows .github/actions

  catalog:
    name: 📚 Workflow Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      # Regenerates the catalog + README badges from the workflow files and fails
      # if the committed copies are stale → run `pnpm gen:workflows` and commit.
      - name: 📚 Verify the workflow catalog is current
        run: pnpm gen:workflows:check
