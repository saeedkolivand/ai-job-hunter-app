name: 🌐 Deploy Landing Page

# ──────────────────────────────────────────────────────────────────────
# GitHub Pages Deploy
# ──────────────────────────────────────────────────────────────────────
# Purpose: Build the Next.js landing app (apps/landing, static export → out/)
#          plus the @ajh/ui Storybook (at /storybook/) and publish to GitHub Pages
# Triggers: push to main touching apps/landing/, packages/ui/, pnpm-lock.yaml, or
#           this workflow, plus manual dispatch
# Source:   apps/landing is a Next.js app with `output: 'export'` — `next build`
#           emits apps/landing/out (flat HTML/CSS/JS + the /public passthrough:
#           dashboards, benchmarks, CNAME, .nojekyll, og-card.jpg). The Storybook
#           build output is copied into out/storybook at deploy time only (never
#           committed).
# Note:     Runs independently of release.yml (also push-to-main) — separate jobs.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'apps/landing/**'
      - 'packages/ui/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🏗️ Build landing (static export)
        run: pnpm --filter @ajh/landing build

      - name: 🔍 Check copy/link parity (no legacy content dropped)
        run: pnpm --filter @ajh/landing check:parity

      - name: 📚 Build Storybook (@ajh/ui)
        env:
          # Storybook's Vite bundle needs heap headroom on the CI runner.
          NODE_OPTIONS: --max-old-space-size=6144
        # Copy the static Storybook into the export output (runner-only;
        # apps/landing/out/storybook is never committed) so it ships in the artifact.
        run: |
          pnpm --filter @ajh/ui build-storybook
          cp -r packages/ui/storybook-static apps/landing/out/storybook

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/landing/out

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
