name: 🌐 Deploy Landing Page

# ──────────────────────────────────────────────────────────────────────
# GitHub Pages Deploy
# ──────────────────────────────────────────────────────────────────────
# Purpose: Publish the static marketing landing page (landing/) plus the
#          @ajh/ui Storybook (at /storybook/) to GitHub Pages
# Triggers: push to main touching landing/, packages/ui/, or this workflow,
#           plus manual dispatch
# Source:   landing/ is a self-contained static site (no build step); the
#           Storybook build output is copied in at deploy time only (never
#           committed). The apps/landing GL experience was reset for a
#           restart (docs/adr/0014) -- this workflow returns to the static
#           upload until the new app exists.
# Note:     Runs independently of release.yml (also push-to-main) — separate jobs.
# ──────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      - 'landing/**'
      - 'packages/ui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 📚 Build Storybook (@ajh/ui)
        env:
          # Storybook's Vite bundle needs heap headroom on the CI runner.
          NODE_OPTIONS: --max-old-space-size=6144
        # Copy the static Storybook alongside the landing pages (runner-only;
        # landing/storybook is never committed) so it ships in the artifact.
        run: |
          pnpm --filter @ajh/ui build-storybook
          cp -r packages/ui/storybook-static landing/storybook

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: landing

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
