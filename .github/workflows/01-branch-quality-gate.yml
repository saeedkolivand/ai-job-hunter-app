name: Branch Quality Gate

on:
  push:
    branches-ignore:
      - main

    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: branch-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks

    runs-on: ubuntu-latest

    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Dependency Packages
        run: pnpm build:packages

      - name: Run ESLint
        run: pnpm lint:strict

      - name: Run TypeScript Check
        run: pnpm typecheck

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Tests
        run: pnpm test

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Cargo Check
        working-directory: apps/tauri/src-tauri
        run: cargo check --all-targets --all-features

      - name: Cargo Clippy
        working-directory: apps/tauri/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

      - name: Cargo Test
        working-directory: apps/tauri/src-tauri
        run: cargo test --all-features

      - name: Notify Discord Failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Branch Quality Gate Failed'
          description: |
            Branch quality checks failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xED4245
