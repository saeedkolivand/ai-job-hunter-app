name: 🔎 Quality (advisory)

# ──────────────────────────────────────────────────────────────────────
# Self-contained, ADVISORY quality checks (none block merge):
#   - typos  : repo-wide spell check (crate-ci/typos, config: typos.toml)
#   - links  : dead-link check for docs (lychee, config: lychee.toml)
#   - knip   : JS/TS dead-code / unused deps/exports (config: knip.json)
# All run on Linux with Harden-Runner egress audit. They surface findings in
# the job log; tune the configs, then flip individual checks to blocking.
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typos:
    name: 🔤 Typos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🔤 Spell check (advisory)
        continue-on-error: true
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  links:
    name: 🔗 Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🔗 Lychee link check (advisory)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--no-progress 'README.md' 'docs/**/*.md'"
          fail: false

  knip:
    name: 🧹 Knip (dead code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: 🧹 Run knip (advisory)
        continue-on-error: true
        run: pnpm exec knip

  i18n:
    name: 🌐 i18n Keys
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      # i18next-cli rewrites the locale files from t() usage; a non-empty diff
      # means missing keys (or sort drift). Advisory: report the drift, then
      # restore. removeUnusedKeys is off (the renderer has dynamic keys), so this
      # flags missing translations, not false "unused" removals.
      - name: 🌐 Check translation keys (advisory)
        continue-on-error: true
        run: |
          pnpm exec i18next-cli extract
          if git diff --quiet -- apps/tauri/src/renderer/i18n/locales; then
            echo "Locale files are in sync with t() usage."
          else
            echo "::warning::i18next-cli would change the locale files (missing keys / sort drift):"
            git --no-pager diff -- apps/tauri/src/renderer/i18n/locales
            git checkout -- apps/tauri/src/renderer/i18n/locales
          fi

  a11y-lint:
    name: ♿ a11y Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm

      # jsx-a11y via a SEPARATE config so the strict main lint is unaffected.
      - name: ♿ ESLint jsx-a11y (advisory)
        continue-on-error: true
        run: pnpm exec eslint --config eslint.a11y.config.mjs 'apps/tauri/src/renderer/**/*.tsx'
