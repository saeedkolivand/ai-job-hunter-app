name: 🔎 Quality

# ──────────────────────────────────────────────────────────────────────
# Advisory quality + perf (consolidated from quality/rust-quality/benchmark).
# None blocks merge.
#   JS/docs (PR): typos · links (lychee) · knip (dead code) · i18n key drift · jsx-a11y
#   Rust   (PR): cargo-hack (each-feature) · cargo-mutants (--in-diff)
#   Perf        : criterion export-render benchmark — records the baseline on
#                 push-to-main, comments on regressions on Rust PRs.
# The benchmark job is the ONLY one with elevated permissions (contents: write +
# the deploy key + the Pages PAT); per-job `permissions:`/`if:` keep every other
# job least-privilege and PR-scoped. A `changes` gate preserves the Rust-only
# filter for benchmark.
# ──────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# File-level least privilege; only the benchmark job widens this.
permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path gate so the perf benchmark only runs when Rust actually changed
  # (mirrors the former benchmark.yml paths filter, now per-job).
  changes:
    name: 🧭 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: 🧭 Path filter
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            rust:
              - 'apps/desktop/src-tauri/**'
              - '.github/workflows/quality.yml'

  # ── JS / docs quality (PR + manual; never on push-to-main) ───────────────────
  typos:
    name: 🔤 Typos
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 🧰 Install typos
        id: install-typos
        continue-on-error: true
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: typos
      # Advisory: run typos ourselves so the findings land in the job Summary
      # (the crate-ci action only emits inline annotations). Never fails the job.
      - name: 🔤 Spell check (advisory)
        continue-on-error: true
        run: |
          set +e
          if ! command -v typos >/dev/null 2>&1; then
            {
              echo "## 🔤 Typos"
              echo "⚠️ typos binary unavailable — check skipped."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          typos --format brief > "$RUNNER_TEMP/typos.txt" 2>&1
          code=$?
          {
            echo "## 🔤 Typos"
            if [ "$code" -eq 0 ]; then
              echo "✅ No typos found."
            else
              echo "Advisory — does not block merge. Possible typos:"
              echo ""
              echo '```'
              cat "$RUNNER_TEMP/typos.txt"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  links:
    name: 🔗 Link Check
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 🔗 Lychee link check (advisory)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--no-progress 'README.md' 'docs/**/*.md'"
          fail: false

  knip:
    name: 🧹 Knip (dead code)
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
      # Advisory: knip's markdown reporter writes a readable table to the job
      # Summary. Never fails the job.
      - name: 🧹 Run knip (advisory)
        continue-on-error: true
        run: |
          set +e
          pnpm exec knip --reporter markdown > "$RUNNER_TEMP/knip.md" 2>&1
          code=$?
          {
            echo "## 🧹 Knip (dead code)"
            if [ "$code" -eq 0 ]; then
              echo "✅ No dead code found."
            else
              echo "Advisory — does not block merge."
              echo ""
              cat "$RUNNER_TEMP/knip.md"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  i18n:
    name: 🌐 i18n Keys
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
      # i18next-cli rewrites the locale files from t() usage; a non-empty diff
      # means missing keys (or sort drift). Advisory: report, then restore.
      - name: 🌐 Check translation keys (advisory)
        continue-on-error: true
        run: |
          pnpm --filter @ajh/translations i18n:extract
          if git diff --quiet -- packages/translations/src/locales; then
            echo "Locale files are in sync with t() usage."
          else
            echo "::warning::i18next-cli would change the locale files (missing keys / sort drift):"
            git --no-pager diff -- packages/translations/src/locales
            git checkout -- packages/translations/src/locales
          fi

  a11y-lint:
    name: ♿ a11y Lint
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 📦 Setup Node + pnpm
        uses: ./.github/actions/setup-node-pnpm
      # jsx-a11y via a SEPARATE config so the strict main lint is unaffected.
      # Advisory: capture the ESLint report into the job Summary. Never fails.
      - name: ♿ ESLint jsx-a11y (advisory)
        continue-on-error: true
        run: |
          set +e
          pnpm exec eslint --config eslint.a11y.config.mjs 'apps/desktop/src/renderer/**/*.tsx' -f stylish > "$RUNNER_TEMP/a11y.txt" 2>&1
          code=$?
          {
            echo "## ♿ a11y Lint (jsx-a11y)"
            if [ "$code" -eq 0 ]; then
              echo "✅ No accessibility problems."
            else
              echo "Advisory — does not block merge."
              echo ""
              echo '```'
              cat "$RUNNER_TEMP/a11y.txt"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  # ── Rust test-quality (PR + manual; never on push-to-main) ───────────────────
  cargo-hack:
    name: 🦀 Feature combinations
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust
      - name: 🧰 Install cargo-hack
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-hack
      - name: 🦀 Check each feature (advisory)
        continue-on-error: true
        working-directory: apps/desktop/src-tauri
        run: cargo hack --each-feature check --all-targets

  cargo-mutants:
    name: 🦀 Mutation testing (PR diff)
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the merge-base diff for --in-diff resolves
      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust
      - name: 🧰 Install cargo-mutants
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-mutants
      - name: 🦀 Mutation testing on the diff (advisory)
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Manual run — full-crate mutation testing is slow; this job only runs --in-diff on PRs."
            exit 0
          fi
          git -C "$GITHUB_WORKSPACE/apps/desktop/src-tauri" diff --relative "$BASE_SHA...HEAD" > "$RUNNER_TEMP/mutants.diff" || true
          if [ ! -s "$RUNNER_TEMP/mutants.diff" ]; then
            echo "No Rust changes under apps/desktop/src-tauri in this PR — skipping mutation testing."
            exit 0
          fi
          cd apps/desktop/src-tauri
          cargo mutants --in-diff "$RUNNER_TEMP/mutants.diff" --timeout 180 || true
      - name: 📊 Upload mutants report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutants-${{ github.run_id }}
          path: apps/desktop/src-tauri/mutants.out/
          retention-days: 7
          if-no-files-found: ignore

  # ── Perf benchmark — push-to-main baseline + PR regression comment ───────────
  # The ONLY elevated job: commits the refreshed dashboard back to main (deploy
  # key) and kicks the Pages deploy (PAT). Runs on push/dispatch, and on PRs only
  # when Rust changed (the `changes` gate).
  benchmark:
    name: 📈 Export render
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # commit benchmark history to landing/benchmarks on main (push runs)
      pull-requests: write # comment on a PR when a result regresses
    steps:
      - name: 🛡️ Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # Full history + the release deploy key so the push-to-main run can
      # commit the refreshed dashboard back to main. PR runs check out WITHOUT
      # the key (and without persisted credentials): `cargo bench` executes PR
      # code, which must never see a secret that can push to main.
      - name: 📥 Checkout Repository (push/dispatch — with deploy key)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: 📥 Checkout Repository (PR — no credentials)
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🦀 Setup Rust (Tauri)
        uses: ./.github/actions/setup-rust

      - name: 📈 Run export benchmarks
        working-directory: apps/desktop/src-tauri
        run: cargo bench --bench export_render --locked -- --output-format bencher | tee output.txt

      - name: 📊 Store result & alert on regression (advisory)
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        continue-on-error: true
        with:
          name: Export render
          tool: cargo
          output-file-path: apps/desktop/src-tauri/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-pages-branch: main
          benchmark-data-dir-path: landing/benchmarks
          skip-fetch-gh-pages: true
          auto-push: false
          comment-on-alert: true
          alert-threshold: '150%'
          fail-on-alert: false
          alert-comment-cc-users: '@saeedkolivand'

      - name: 📤 Commit benchmark data
        id: commit
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git log origin/main..HEAD --oneline)" ]; then
            echo "Benchmark data unchanged — nothing to push."
            exit 0
          fi
          git commit --amend -m "chore: update export benchmark data [skip ci]"
          remote="git@github.com:saeedkolivand/ai-job-hunter-app.git"
          # origin/main can advance during the ~16-min bench run, so a plain push
          # races and is rejected. Rebase the single [skip ci] benchmark commit
          # onto the latest origin/main and retry the push a few times.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::benchmark commit failed to rebase onto origin/main"
              exit 1
            fi
            if git push "$remote" HEAD:main; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push rejected (attempt $attempt/5) — origin/main moved, retrying after backoff"
            sleep $((attempt * 5))
          done
          echo "::error::failed to push benchmark data to main after 5 attempts"
          exit 1

      - name: 🌐 Trigger Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh workflow run pages.yml --ref main
