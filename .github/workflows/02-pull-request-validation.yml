name: Pull Request Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  node-checks:
    name: Node.js Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-
            turbo-${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Dependency Packages
        run: pnpm build:packages

      - name: Run ESLint
        run: pnpm lint:strict

      - name: Run TypeScript Check
        run: pnpm typecheck

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Tests
        run: pnpm test

  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Cargo Check
        working-directory: apps/tauri/src-tauri
        run: cargo check --all-targets --all-features

      - name: Cargo Clippy
        working-directory: apps/tauri/src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

      - name: Cargo Test
        working-directory: apps/tauri/src-tauri
        run: cargo test --all-features

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [node-checks, rust-checks]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri
          cache-on-failure: true

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace
        run: pnpm build

  notify:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [node-checks, rust-checks, build-verification]
    if: failure() && secrets.DISCORD_WEBHOOK_URL != ''
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: 'Pull Request Validation Failed'
          description: |
            PR #${{ github.event.pull_request.number }} failed validation.

            Repository: ${{ github.repository }}
            Author: ${{ github.event.pull_request.user.login }}
            Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: 0xED4245
