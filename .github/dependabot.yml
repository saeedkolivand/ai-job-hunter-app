version: 2

updates:
  # The single root npm entry covers EVERY pnpm workspace member manifest via
  # the shared root pnpm-lock.yaml — apps/desktop, apps/extension, apps/landing
  # (rejoined the workspace in #740), and packages/*. Do NOT add per-member npm
  # entries: workspace members have no own lockfile, so a directory entry for
  # one would duplicate or fail.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    open-pull-requests-limit: 10

    # Wait for releases to age before opening a PR — keeps bot PRs from
    # colliding with the pnpm minimumReleaseAge gate (pnpm-workspace.yaml).
    cooldown:
      default-days: 2

    # One combined PR for routine minor+patch bumps; majors stay separate.
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

    labels:
      - dependencies

    # typescript-eslint peers `typescript <6.1` — no TS 7 support yet (latest
    # 8.64 still caps there). The ROOT typescript stays on 6 so eslint's parser
    # works; apps/packages pin 7 themselves (real TS 7). Block major bumps so a
    # dependabot PR can't re-collapse that split by bumping root 6 -> 7 (#660).
    # apps/landing ALSO pins TS 6 for its own reason: Next 16's
    # verifyTypeScriptSetup breaks under TS 7's package layout (see the
    # "//typescript" note in apps/landing/package.json) — this same ignore
    # protects that pin too. Drop only when BOTH constraints clear.
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major

    commit-message:
      prefix: chore

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly

    cooldown:
      default-days: 2

    labels:
      - dependencies

    # The typst family (typst, typst-pdf, typst-svg, typst-render,
    # typst-layout) is exact-pinned and must bump in lockstep — a partial
    # bump splits the pins (#851) and risks mixed-version rendering.
    groups:
      typst:
        patterns:
          - typst
          - typst-*

    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

    labels:
      - github-actions

    # codeql-action init/analyze must move in lockstep: init writes a config
    # stamped with its own version and a newer analyze refuses to load it.
    groups:
      codeql-action:
        patterns:
          - github/codeql-action
          - github/codeql-action/*
