version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    open-pull-requests-limit: 10

    # Wait for releases to age before opening a PR — keeps bot PRs from
    # colliding with the pnpm minimumReleaseAge gate (pnpm-workspace.yaml).
    cooldown:
      default-days: 2

    # One combined PR for routine minor+patch bumps; majors stay separate.
    groups:
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

    labels:
      - dependencies

    # typescript-eslint peers `typescript <6.1` — no TS 7 support yet (latest
    # 8.64 still caps there). The ROOT typescript stays on 6 so eslint's parser
    # works; apps/packages pin 7 themselves (real TS 7). Block major bumps so a
    # dependabot PR can't re-collapse that split by bumping root 6 -> 7 (#660).
    # Drop this once typescript-eslint supports TS 7.
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major

    commit-message:
      prefix: chore

  - package-ecosystem: cargo
    directory: /apps/desktop/src-tauri
    schedule:
      interval: weekly

    cooldown:
      default-days: 2

    labels:
      - dependencies

    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

    labels:
      - github-actions
