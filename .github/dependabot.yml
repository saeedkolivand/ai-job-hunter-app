version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    open-pull-requests-limit: 10

    labels:
      - dependencies
      - security

    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

    labels:
      - github-actions
