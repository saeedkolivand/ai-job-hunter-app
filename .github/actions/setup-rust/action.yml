name: Setup Rust (Tauri)
description: Install the Rust toolchain, the Linux Tauri system deps, and the shared Rust cache.

inputs:
  components:
    description: Comma-separated rustup components (e.g. "clippy, rustfmt").
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: 🦀 Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}

    # NOTE: cache-apt-pkgs-action does not actually install dev packages to the
    # system location pkg-config searches (reports "Clean installing" but
    # gdk-3.0.pc etc. are missing afterward) — use apt-get directly instead.
    - name: 🐧 Install Linux Dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libxdo-dev \
          libssl-dev \
          patchelf \
          build-essential \
          curl wget file

    - name: 💾 Restore Rust Cache
      uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        workspaces: apps/desktop/src-tauri
        cache-on-failure: true
