<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Job Hunter — Architecture Map</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='none' stroke='black' stroke-width='2'/><path d='M11 14 q2 2 4 0 M17 14 q2 2 4 0 M11 22 q5 -4 10 0' fill='none' stroke='black' stroke-width='2' stroke-linecap='round'/><ellipse cx='10' cy='18' rx='1.6' ry='2.8' fill='deepskyblue'/></svg>">
    <style>
      :root {
        --bg: #0f0f0f;
        --panel: #161616;
        --panel-2: #1c1c1c;
        --border: #2a2a2a;
        --text: #e8e8e8;
        --muted: #8a8a8a;
        --client: #4ea1ff;
        --hooks: #7bd389;
        --prompts: #f5b942;
        --contract: #c792ea;
        --command: #ff7a45;
        --domain: #5ec8c8;
        --scraper: #7bd389;
        --provider: #c792ea;
        --data: #ffb86b;
        --external: #ff6b9d;
        --infra: #9aa7b3;
        --critical: #ff3860;
        --api: #ff7a45;
        --db: #ffb86b;
        --mount: #4ea1ff;
        --normal: #3a3a3a;
        --accent: #f5b942;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font:
          13px/1.5 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex: 0 0 auto;
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      header .meta {
        color: var(--muted);
        font-size: 11.5px;
      }
      .chips {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-left: auto;
      }
      .chip {
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--muted);
        cursor: pointer;
        font-size: 11.5px;
        user-select: none;
        white-space: nowrap;
      }
      .chip:hover {
        border-color: #3d3d3d;
        color: var(--text);
      }
      .chip.active {
        background: var(--accent);
        color: #161616;
        border-color: var(--accent);
        font-weight: 600;
      }
      .chip.bugchip.active {
        background: var(--critical);
        color: #fff;
        border-color: var(--critical);
      }
      main {
        flex: 1 1 auto;
        display: flex;
        min-height: 0;
      }
      #stage {
        position: relative;
        flex: 1 1 auto;
        overflow: hidden;
        cursor: grab;
        background: radial-gradient(circle at 30% 20%, #141414 0, var(--bg) 60%);
      }
      #stage.panning {
        cursor: grabbing;
      }
      svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .clusterBox {
        fill-opacity: 0.05;
        stroke-opacity: 0.3;
        stroke-width: 1.2;
        rx: 14;
      }
      .clusterLabel {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .clusterLabel.count {
        font-size: 10.5px;
        font-weight: 500;
        text-transform: none;
        letter-spacing: 0;
      }
      .node {
        cursor: pointer;
      }
      .node rect.box {
        fill: var(--panel);
        stroke-width: 1.4;
        rx: 8;
        transition: opacity 0.12s;
      }
      .node.crit rect.box {
        stroke-width: 2.4;
      }
      .node:focus {
        outline: none;
      }
      .node:focus-visible rect.box {
        stroke: var(--accent);
        stroke-width: 3.2;
      }
      .node text.lbl {
        fill: var(--text);
        font-size: 12px;
        font-weight: 600;
      }
      .node text.sub {
        fill: var(--muted);
        font-size: 10px;
      }
      .node text.dead {
        fill: var(--critical);
        font-size: 9.5px;
        font-weight: 700;
      }
      .edge {
        fill: none;
        stroke-width: 1.4;
      }
      .edge.kind-critical {
        stroke: var(--critical);
        stroke-width: 2.2;
      }
      .edge.kind-api {
        stroke: var(--api);
        stroke-dasharray: 1 0;
      }
      .edge.kind-db {
        stroke: var(--db);
      }
      .edge.kind-mount {
        stroke: var(--mount);
        stroke-opacity: 0.7;
      }
      .edge.kind-normal {
        stroke: var(--normal);
      }
      .edgeLabel {
        fill: #9b9b9b;
        font-size: 9.5px;
      }
      .edgeLabel.crit {
        fill: #ff8095;
      }
      .badge text {
        font-size: 9px;
        font-weight: 700;
        fill: #0c0c0c;
      }
      .dim {
        opacity: 0.12 !important;
      }
      .hide {
        display: none;
      }
      #kbd-help {
        position: absolute;
        right: 14px;
        bottom: 56px;
        z-index: 30;
        max-width: 240px;
        padding: 12px 14px;
        font-size: 11.5px;
        color: var(--muted);
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
      }
      #kbd-help[hidden] {
        display: none;
      }
      #kbd-help .kbd-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        color: var(--text);
        font-weight: 600;
      }
      #kbd-help-close {
        width: 22px;
        height: 22px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 5px;
        background: var(--panel);
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      #kbd-help-close:hover {
        color: var(--text);
        border-color: #444;
      }
      #kbd-help-close:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 5px;
      }
      #kbd-help ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }
      #kbd-help kbd {
        display: inline-block;
        min-width: 12px;
        padding: 1px 5px;
        margin-right: 2px;
        font: inherit;
        font-size: 10.5px;
        text-align: center;
        color: var(--text);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      /* sidebar */
      #side {
        flex: 0 0 360px;
        max-width: 42vw;
        border-left: 1px solid var(--border);
        background: var(--panel);
        overflow: auto;
        padding: 16px 16px 40px;
      }
      #side h2 {
        font-size: 14px;
        margin: 0 0 2px;
      }
      #side .role {
        color: var(--text);
        margin: 6px 0;
      }
      #side .plain {
        color: #bfd7c9;
        background: #13261c;
        border: 1px solid #1d3a2a;
        border-radius: 8px;
        padding: 8px 10px;
        margin: 8px 0;
      }
      #side .path {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: #8fb8e6;
        word-break: break-all;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
      }
      #side .k {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
        margin: 14px 0 4px;
      }
      #side ul {
        margin: 4px 0;
        padding-left: 16px;
      }
      #side li {
        margin: 2px 0;
        color: #cfcfcf;
      }
      #side .tag {
        display: inline-block;
        font-size: 10px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 1px 6px;
        margin: 2px 4px 2px 0;
      }
      #side .fix,
      #side .bug {
        border-radius: 8px;
        padding: 7px 9px;
        margin: 6px 0;
        font-size: 12px;
      }
      #side .fix {
        background: #10240f;
        border: 1px solid #1f3d1d;
        color: #bfe6b5;
      }
      #side .bug {
        background: #2a1014;
        border: 1px solid #4a1c24;
        color: #ffb3c0;
      }
      #side .sev {
        font-weight: 700;
        text-transform: uppercase;
        font-size: 9.5px;
        margin-right: 6px;
      }
      #side .edgepair {
        font-size: 11.5px;
        color: #cfcfcf;
        margin: 2px 0;
      }
      #side .edgepair b {
        color: #fff;
        font-weight: 600;
      }
      #side .findings li {
        margin: 6px 0;
      }
      .controls {
        position: absolute;
        right: 14px;
        bottom: 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .controls button {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        font-size: 16px;
        cursor: pointer;
      }
      .controls button:hover {
        border-color: #444;
      }
      .controls button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 8px;
      }
      .legend {
        position: absolute;
        left: 14px;
        bottom: 14px;
        background: rgba(20, 20, 20, 0.82);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 11px;
        font-size: 11px;
        color: var(--muted);
      }
      .legend .row {
        display: flex;
        align-items: center;
        gap: 7px;
        margin: 2px 0;
      }
      .legend .sw {
        width: 22px;
        height: 0;
        border-top: 3px solid;
        display: inline-block;
      }
      .legend .dot {
        width: 11px;
        height: 11px;
        border-radius: 3px;
        display: inline-block;
        border: 1.4px solid;
      }

      /* ── Responsive layout ─────────────────────────────────────────────────── */
      @media (max-width: 640px) {
        #side {
          flex: 0 0 240px;
          max-width: 55vw;
          font-size: 12px;
          padding: 12px 10px 32px;
        }
        header h1 {
          font-size: 13px;
        }
        .chips {
          margin-left: 0;
          width: 100%;
        }
      }
      @media (max-width: 480px) {
        #side {
          display: none;
        }
        .controls {
          bottom: 10px;
          right: 10px;
        }
        .legend {
          display: none;
        }
      }

      /* ── Focus-visible rings (AA keyboard navigation) ──────────────────────── */
      a:focus-visible,
      button:focus-visible,
      [tabindex]:focus-visible,
      [role="button"]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 4px;
      }
      /* Chip buttons have pill shape */
      .chip:focus-visible {
        border-radius: 999px;
      }
      /* SVG node focus ring is the stroke variant — suppress outline there */
      .node:focus-visible {
        outline: none;
      }

      /* ── Reduced motion ────────────────────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        /* Kill transitions on non-focus elements; preserve the focus-visible
           outline so keyboard users keep the ring */
        .node rect.box {
          transition: none;
        }
        /* Suppress any CSS animation (none used currently; guard for future) */
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          /* Do NOT touch transition on :focus-visible elements */
        }
        /* Restore focus-visible outline transitions explicitly */
        a:focus-visible,
        button:focus-visible,
        [tabindex]:focus-visible,
        [role="button"]:focus-visible {
          transition: outline-color 0s;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>
          AI Job Hunter
          <span class="meta"
            >— interactive architecture map · local-first Tauri 2 monorepo (v0.33.0)</span
          >
        </h1>
        <div class="chips" id="chips"></div>
      </header>
      <main>
        <div id="stage">
          <svg id="svg" viewBox="0 0 3060 1330" preserveAspectRatio="xMidYMid meet">
            <defs>
              <marker
                id="ar-critical"
                markerWidth="9"
                markerHeight="9"
                refX="7.5"
                refY="3"
                orient="auto"
              >
                <path d="M0,0 L7,3 L0,6 Z" fill="#ff3860" />
              </marker>
              <marker
                id="ar-api"
                markerWidth="9"
                markerHeight="9"
                refX="7.5"
                refY="3"
                orient="auto"
              >
                <path d="M0,0 L7,3 L0,6 Z" fill="#ff7a45" />
              </marker>
              <marker id="ar-db" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto">
                <path d="M0,0 L7,3 L0,6 Z" fill="#ffb86b" />
              </marker>
              <marker
                id="ar-mount"
                markerWidth="9"
                markerHeight="9"
                refX="7.5"
                refY="3"
                orient="auto"
              >
                <path d="M0,0 L7,3 L0,6 Z" fill="#4ea1ff" />
              </marker>
              <marker
                id="ar-normal"
                markerWidth="9"
                markerHeight="9"
                refX="7.5"
                refY="3"
                orient="auto"
              >
                <path d="M0,0 L7,3 L0,6 Z" fill="#3a3a3a" />
              </marker>
            </defs>
            <g id="vp">
              <g id="gClusters"></g>
              <g id="gEdges"></g>
              <g id="gNodes"></g>
            </g>
          </svg>
          <div class="controls">
            <button id="zin" title="Zoom in" aria-label="Zoom in">+</button>
            <button id="zout" title="Zoom out" aria-label="Zoom out">−</button>
            <button id="fit" title="Fit to screen" aria-label="Fit to screen" style="font-size: 11px">Fit</button>
            <button id="help-btn" title="Keyboard shortcuts (?)" aria-label="Keyboard shortcuts" aria-expanded="false">
              ?
            </button>
          </div>
          <div class="legend" id="legend"></div>
          <div id="kbd-help" hidden role="dialog" aria-modal="true" aria-labelledby="kbd-help-title">
            <div class="kbd-title">
              <span id="kbd-help-title">Keyboard shortcuts</span>
              <button id="kbd-help-close" aria-label="Close keyboard shortcuts">✕</button>
            </div>
            <ul>
              <li><kbd>drag</kbd> · <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> pan</li>
              <li><kbd>wheel</kbd> · <kbd>+</kbd><kbd>−</kbd> zoom</li>
              <li><kbd>Tab</kbd> focus next node</li>
              <li><kbd>Enter</kbd> pin · <kbd>Esc</kbd> clear</li>
              <li><kbd>0</kbd> / <kbd>F</kbd> fit · <kbd>?</kbd> toggle help</li>
            </ul>
          </div>
        </div>
        <aside id="side" aria-live="polite" aria-atomic="false"></aside>
      </main>
    </div>

    <script>
      /* ============================================================================
       * AI Job Hunter — architecture map data.
       * Hand-editable: every node has an explicit x,y,w,h; edit freely.
       *   N(id, cluster, label, sub, x, y, w, h, color, opts)
       * Coordinates use a per-column grid:  y = 96 + row*64 ;  column x constants below.
       * ==========================================================================*/

      const clusters = [
        {
          id: 'client',
          label: 'Client / Renderer',
          x: 20,
          y: 20,
          w: 250,
          h: 1120,
          color: 'client',
        },
        { id: 'hooks', label: 'Service Hooks', x: 300, y: 20, w: 250, h: 1120, color: 'hooks' },
        {
          id: 'prompts',
          label: 'Prompts (LLM assembly)',
          x: 580,
          y: 20,
          w: 250,
          h: 1120,
          color: 'prompts',
        },
        {
          id: 'contract',
          label: 'Shared Contracts',
          x: 860,
          y: 20,
          w: 250,
          h: 1120,
          color: 'contract',
        },
        {
          id: 'command',
          label: 'Rust Commands',
          x: 1140,
          y: 20,
          w: 250,
          h: 1120,
          color: 'command',
        },
        { id: 'domain', label: 'Rust Domains', x: 1420, y: 20, w: 250, h: 1120, color: 'domain' },
        {
          id: 'scraper',
          label: 'Scrapers (SCRAPERS · 20)',
          x: 1700,
          y: 20,
          w: 472,
          h: 1120,
          color: 'scraper',
        },
        {
          id: 'provapp',
          label: 'AI Providers',
          x: 2220,
          y: 20,
          w: 250,
          h: 1120,
          color: 'provider',
        },
        { id: 'data', label: 'Data', x: 2500, y: 20, w: 250, h: 1120, color: 'data' },
        { id: 'external', label: 'External', x: 2780, y: 20, w: 256, h: 1120, color: 'external' },
        {
          id: 'infra',
          label: 'Platform Infra (single-owner · composed everywhere)',
          x: 1140,
          y: 1170,
          w: 1330,
          h: 130,
          color: 'infra',
        },
      ];

      const N = (id, cluster, label, sub, x, y, w, h, color, opts = {}) => ({
        id,
        cluster,
        label,
        sub,
        x,
        y,
        w,
        h,
        color,
        ...opts,
      });

      const nodes = [
        // ── Client / Renderer (x 29) ───────────────────────────────────────────────
        N('c-main', 'client', 'main.tsx', 'renderer bootstrap', 29, 96, 232, 46, 'client', {
          role: 'React entry point: mounts the app inside AppClientProvider + CapabilityProvider and boots the router.',
          plain:
            'The very first code that runs when the window opens — it switches the lights on for the whole interface.',
          path: 'apps/desktop/src/renderer/main.tsx',
          notes: [
            'Wraps app in <AppClientProvider> (transport) + <CapabilityProvider>',
            'Registers the Tauri invoke client',
          ],
          tag: ['overview', 'all'],
        }),
        N('c-root', 'client', '__root.tsx', 'router shell', 29, 160, 232, 46, 'client', {
          role: 'Root route: persistent app chrome (Sidebar, Titlebar, StatusBar) wrapping <Outlet/>.',
          plain:
            'The frame that stays put — the sidebar and title bar — while the centre swaps between screens.',
          path: 'apps/desktop/src/renderer/routes/__root.tsx',
          notes: ['Hosts the 11 feature routes', 'TanStack Router, file-based'],
          tag: ['overview', 'all'],
        }),
        N('c-dash', 'client', 'index.tsx', 'Dashboard route', 29, 224, 232, 46, 'client', {
          role: 'Dashboard: pipeline overview, AI insights, recent activity.',
          plain: 'The home screen — a quick snapshot of where your job hunt stands.',
          path: 'apps/desktop/src/renderer/routes/index.tsx',
          notes: ['Aggregates jobs + AI status'],
          tag: ['overview', 'dashboard', 'all'],
        }),
        N('c-aigen', 'client', 'ai-generate.tsx', 'AI Generate route', 29, 288, 232, 46, 'client', {
          role: 'AI Generate page: resume + cover-letter generation UI with streaming output.',
          plain:
            'The screen where you paste a job ad and your resume, and the AI writes a tailored resume and cover letter live.',
          path: 'apps/desktop/src/renderer/routes/ai-generate.tsx',
          notes: [
            'Headline feature — the red spine starts here',
            'Drives the ai-generate state machine',
          ],
          tag: ['overview', 'aigenerate', 'all'],
          critical: true,
        }),
        N('c-analyze', 'client', 'analyze.tsx', 'Analyze route', 29, 352, 232, 46, 'client', {
          role: 'Resume analysis page: ATS score, skill gaps, language mismatch, rewrites.',
          plain: 'A screen that grades your resume against a job and tells you what to fix.',
          path: 'apps/desktop/src/renderer/routes/analyze.tsx',
          notes: ['11 analysis panels'],
          tag: ['analyze', 'all'],
        }),
        N('c-autopilot', 'client', 'autopilot.tsx', 'Autopilot route', 29, 416, 232, 46, 'client', {
          role: 'Autopilot page: workflow builder wizard + run monitor.',
          plain:
            'The "do the hunt for me" screen — set up a workflow that searches and applies on a schedule.',
          path: 'apps/desktop/src/renderer/routes/autopilot.tsx',
          notes: ['3-step wizard → scheduled runner'],
          tag: ['autopilot', 'all'],
        }),
        N('c-jobs', 'client', 'jobs.tsx', 'Jobs route', 29, 480, 232, 46, 'client', {
          role: 'Jobs list: scraped postings, filters, interaction history.',
          plain: 'A list of every job the app has found, with notes on what you did with each.',
          path: 'apps/desktop/src/renderer/routes/jobs.tsx',
          notes: [],
          tag: ['scrape', 'all'],
        }),
        N('c-settings', 'client', 'settings.tsx', 'Settings route', 29, 608, 232, 46, 'client', {
          role: 'Settings: AI providers, accounts, preferences, privacy/backup.',
          plain: 'Where you choose your AI engine, log in to job boards, and tune the app.',
          path: 'apps/desktop/src/renderer/routes/settings.tsx',
          notes: ['AI provider switcher lives here'],
          tag: ['settings', 'all'],
        }),
        N(
          'c-appclient',
          'client',
          'app-client.ts',
          'AppClient · useAppClient',
          29,
          672,
          232,
          46,
          'client',
          {
            role: 'The single transport abstraction (= IpcContract) between renderer and backend; getClient() for use outside React.',
            plain:
              'The one doorway the interface uses to talk to the engine. Everything goes through it, so the UI can be tested without the real backend.',
            path: 'apps/desktop/src/renderer/lib/app-client/app-client.ts:24',
            notes: [
              'God node — ~167 graph edges (not all drawn)',
              'Swappable: Tauri client in prod, mock client in tests',

      /* ===========================================================================

       * ===========================================================================*/
      const COLORS = {
        client: '#4ea1ff',
        hooks: '#7bd389',
        prompts: '#f5b942',
        contract: '#c792ea',
        command: '#ff7a45',
        domain: '#5ec8c8',
        scraper: '#7bd389',
        provider: '#c792ea',
        data: '#ffb86b',
        external: '#ff6b9d',
        infra: '#9aa7b3',

      };
      const SVGNS = 'http://www.w3.org/2000/svg';
      const byId = Object.fromEntries(nodes.map((n) => [n.id, n]));
      const gClusters = document.getElementById('gClusters');
      const gEdges = document.getElementById('gEdges');
      const gNodes = document.getElementById('gNodes');
      const svg = document.getElementById('svg');
      const stage = document.getElementById('stage');
      const side = document.getElementById('side');

      function el(tag, attrs = {}, parent) {
        const e = document.createElementNS(SVGNS, tag);
        for (const k in attrs) e.setAttribute(k, attrs[k]);
        if (parent) parent.appendChild(e);
        return e;
      }

      // adjacency for selection
      const adj = {};
      nodes.forEach((n) => (adj[n.id] = new Set()));
      edges.forEach((e) => {
        if (adj[e.from] && adj[e.to]) {
          adj[e.from].add(e.to);
          adj[e.to].add(e.from);
        }
      });

      // ---- clusters ----
      clusters.forEach((c) => {
        const col = COLORS[c.color] || '#888';
        const r = el(
          'rect',
          {
            x: c.x,
            y: c.y,
            width: c.w,
            height: c.h,
            rx: 14,
            fill: col,
            stroke: col,
            class: 'clusterBox',
            'fill-opacity': 0.05,
            'stroke-opacity': 0.3,
          },
          gClusters
        );
        const t = el(
          'text',
          { x: c.x + 14, y: c.y + 28, class: 'clusterLabel', fill: col, 'fill-opacity': 0.85 },
          gClusters
        );
        t.textContent = c.label;
      });

      // ---- edges ----
      const edgeEls = [];
      function edgePath(a, b) {
        const x1 = a.x + a.w,
          y1 = a.y + a.h / 2,
          x2 = b.x,
          y2 = b.y + b.h / 2;
        // if b is to the left (return edge), exit/enter on left/right sensibly
        let sx = x1,
          sy = y1,
          ex = x2,
          ey = y2;
        if (b.x < a.x) {
          sx = a.x;
          ex = b.x + b.w;
        }
        const dx = Math.max(40, Math.abs(ex - sx) * 0.45);
        const c1x = sx + (ex >= sx ? dx : -dx),
          c2x = ex - (ex >= sx ? dx : -dx);
        return {
          d: `M ${sx} ${sy} C ${c1x} ${sy}, ${c2x} ${ey}, ${ex} ${ey}`,
          mx: (sx + ex) / 2,
          my: (sy + ey) / 2,
        };
      }
      edges.forEach((e, i) => {
        const a = byId[e.from],
          b = byId[e.to];
        if (!a || !b) return;
        const p = edgePath(a, b);
        const path = el(
          'path',
          { d: p.d, class: 'edge kind-' + e.kind, 'marker-end': `url(#ar-${e.kind})` },
          gEdges
        );
        let lbl = null;
        if (e.label) {
          lbl = el(
            'text',
            {
              x: p.mx,
              y: p.my - 3 + ((i % 3) - 1) * 6,
              class: 'edgeLabel' + (e.kind === 'critical' ? ' crit' : ''),
              'text-anchor': 'middle',
            },
            gEdges
          );
          lbl.textContent = e.label;
        }
        edgeEls.push({ e, path, lbl, a, b });
      });

      // ---- nodes ----
      const nodeEls = {};
      nodes.forEach((n) => {
        const col = COLORS[n.color] || '#888';
        const g = el(
          'g',
          {
            class: 'node' + (n.critical ? ' crit' : ''),
            'data-id': n.id,
            tabindex: '0',
            role: 'button',
            'aria-label': `${n.label}${n.sub ? ' — ' + n.sub : ''}${n.role ? '. ' + n.role : ''}`,
          },
          gNodes
        );
        el(
          'rect',
          { x: n.x, y: n.y, width: n.w, height: n.h, rx: 8, class: 'box', stroke: col },
          g
        );
        const lbl = el(
          'text',
          { x: n.x + 12, y: n.y + (n.sub ? n.h / 2 - 1 : n.h / 2 + 4), class: 'lbl' },
          g
        );
        lbl.textContent = n.label;
        if (n.sub) {
          const s = el('text', { x: n.x + 12, y: n.y + n.h / 2 + 13, class: 'sub' }, g);
          s.textContent = n.sub;
        }
        // dead-code sub-label
        if (n.dead) {
          const d = el('text', { x: n.x + 12, y: n.y + n.h - 5, class: 'dead' }, g);
          d.textContent = n.dead;
        }
        // badges
        const fixes = FIXES[n.id],
          bugs = KNOWN_BUGS[n.id];
        if (fixes) {
          const bg = el('g', { class: 'badge' }, g);
          el(
            'circle',
            {
              cx: n.x + n.w - 10,
              cy: n.y + 10,
              r: 8,
              fill: '#5fd96b',

          tx.textContent = fixes.length;

          const bg = el('g', { class: 'badge' }, g);
          el(

              fill: '#fff',

          tx.textContent = bugs.length;
        }
        g.addEventListener('mouseenter', () => {
          hover = n.id;
          applyView();
          renderSidebar(focusId());
        });
        g.addEventListener('mouseleave', () => {
          hover = null;
          applyView();
          renderSidebar(focusId());
        });
        g.addEventListener('click', (ev) => {
          ev.stopPropagation();
          pinned = pinned === n.id ? null : n.id;
          hover = null;
          applyView();
          renderSidebar(pinned);
        });
        // Keyboard focus mirrors hover; Tab walks nodes in reading order and
        // pans each one into view, Enter/Space pins it.
        g.addEventListener('focus', () => {
          hover = n.id;
          applyView();
          renderSidebar(focusId());
          ensureVisible(n);
        });
        g.addEventListener('blur', () => {
          hover = null;
          applyView();
          renderSidebar(focusId());
        });
        g.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter' || ev.key === ' ') {
            ev.preventDefault();
            pinned = pinned === n.id ? null : n.id;
            applyView();
            renderSidebar(pinned);
          }
        });
        nodeEls[n.id] = g;

      /* ---- view state: filter + selection ---- */
      let filter = 'overview';
      let pinned = null; // clicked node
      let hover = null; // hovered node
      function focusId() {
        return hover || pinned;
      }

      function hasBadge(id) {
        return FIXES[id] || KNOWN_BUGS[id];
      }
      function passNodeFilter(n) {
        if (filter === 'all' || filter === 'overview') return true;
        if (filter === 'bugs') return !!hasBadge(n.id);
        return (n.tag || []).includes(filter);
      }
      function passEdgeFilter(e) {
        if (filter === 'all') return true;
        if (filter === 'overview') return e.kind !== 'normal' || (e.tag || []).includes('overview');
        if (filter === 'bugs') return false;
        return (e.tag || []).includes(filter);
      }

      function applyView() {
        const sel = focusId();
        let nbset = null;
        if (sel) {
          nbset = new Set(adj[sel]);
          nbset.add(sel);
        }
        nodes.forEach((n) => {
          const g = nodeEls[n.id];
          const on = sel ? nbset.has(n.id) : passNodeFilter(n);
          g.classList.toggle('dim', !on);
        });
        edgeEls.forEach(({ e, path, lbl }) => {
          const show = sel ? e.from === sel || e.to === sel : passEdgeFilter(e);
          path.classList.toggle('hide', !show);
          if (lbl) lbl.classList.toggle('hide', !show);
        });
      }

      /* ---- sidebar ---- */
      function esc(s) {
        return (s == null ? '' : String(s))
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }
      function renderSidebar(id) {
        if (!id) {
          side.innerHTML = defaultSidebar();
          return;
        }
        const n = byId[id];
        if (!n) {
          side.innerHTML = defaultSidebar();
          return;
        }
        const ins = edges.filter((e) => e.to === id),
          outs = edges.filter((e) => e.from === id);
        const fixes = FIXES[id],
          bugs = KNOWN_BUGS[id];
        let h = '';
        h += `<h2>${esc(n.label)}</h2>`;
        if (n.sub)
          h += `<div style="color:var(--muted);font-size:11px;margin-bottom:6px">${esc(n.sub)}</div>`;
        if (n.role) h += `<div class="role">${esc(n.role)}</div>`;
        if (n.plain) h += `<div class="plain">${esc(n.plain)}</div>`;
        if (n.path) h += `<div class="path">${esc(n.path)}</div>`;
        if (bugs) {
          h += `<div class="k">Known bugs</div>`;
          bugs.forEach(
            (b) =>
              (h += `<div class="bug"><span class="sev">${esc(b.sev)}</span>${esc(b.t)}<div style="opacity:.7;font-size:10px;margin-top:3px">${esc(b.ref)}</div></div>`)
          );
        }
        if (fixes) {
          h += `<div class="k">Roadmap / fixes</div>`;
          fixes.forEach((f) => (h += `<div class="fix">#${f.n} · ${esc(f.t)}</div>`));
        }
        if (n.notes && n.notes.length) {
          h += `<div class="k">Notes</div><ul>`;
          n.notes.forEach((x) => (h += `<li>${esc(x)}</li>`));
          h += `</ul>`;
        }
        h += `<div class="k">Wires in (${ins.length})</div>`;
        ins.forEach(
          (e) =>
            (h += `<div class="edgepair">← <b>${esc(byId[e.from]?.label || e.from)}</b> · ${esc(e.label || e.kind)}</div>`)
        );
        h += `<div class="k">Wires out (${outs.length})</div>`;
        outs.forEach(
          (e) =>
            (h += `<div class="edgepair">→ <b>${esc(byId[e.to]?.label || e.to)}</b> · ${esc(e.label || e.kind)}</div>`)
        );
        if (n.tag) {
          h += `<div class="k">Tags</div><div>`;
          n.tag.forEach((t) => (h += `<span class="tag">${esc(t)}</span>`));
          h += `</div>`;
        }
        side.innerHTML = h;
      }
      function defaultSidebar() {
        let h = `<h2>AI Job Hunter — architecture</h2>
   <div class="role">Local-first Tauri 2 desktop app. The renderer talks to a Rust core only through typed IPC contracts (ports &amp; adapters). Heavy work — scraping, document extraction, AI generation, embeddings — runs natively in-process.</div>
   <div class="plain">Click any box for its plain-English role, real file path, and what wires into and out of it. Use the chips up top to highlight a feature or a user-flow path. Drag to pan, scroll to zoom.</div>
   <div class="k">Notable findings from this map</div><ul class="findings">`;
        FINDINGS.forEach((f) => (h += `<li>${f}</li>`));
        h += `</ul><div class="k">Counts</div><div style="color:#cfcfcf">${nodes.length} nodes · ${edges.length} edges · ${clusters.length} clusters · 16 boards · 8 AI providers</div>`;
        h += `<div class="k">Critical paths</div><div style="color:#cfcfcf">Red = <b>AI Generate</b> (default). Click <b>Autopilot</b> or <b>Scrape → Match</b> to light up the other two flows.</div>`;
        return h;
      }

      /* ---- filter chips ---- */
      const CHIPS = [
        ['overview', 'Overview'],
        ['aigenerate', 'AI Generate'],
        ['autopilot', 'Autopilot'],
        ['scrape', 'Scrape → Match'],
        ['analyze', 'Analyze'],
        ['documents', 'Documents'],
        ['settings', 'Settings'],
        ['all', 'Show all wires'],
        ['bugs', 'Roadmap & bugs'],
      ];
      const chipsBox = document.getElementById('chips');
      CHIPS.forEach(([id, label]) => {
        const b = document.createElement('button');
        b.className =
          'chip' + (id === 'overview' ? ' active' : '') + (id === 'bugs' ? ' bugchip' : '');
        b.textContent = label;
        b.dataset.f = id;
        b.setAttribute('aria-pressed', id === 'overview' ? 'true' : 'false');
        b.addEventListener('click', () => {
          filter = id;
          pinned = null;
          hover = null;
          [...chipsBox.children].forEach((c) => {
            const on = c.dataset.f === id;
            c.classList.toggle('active', on);
            c.setAttribute('aria-pressed', on ? 'true' : 'false');
          });
          renderSidebar(null);
          applyView();
        });
        chipsBox.appendChild(b);
      });

      /* ---- legend ---- */
      document.getElementById('legend').innerHTML = `
  <div class="row"><span class="sw" style="border-color:#ff3860"></span> critical path</div>
  <div class="row"><span class="sw" style="border-color:#ff7a45"></span> external / API call</div>
  <div class="row"><span class="sw" style="border-color:#ffb86b"></span> DB read/write</div>
  <div class="row"><span class="sw" style="border-color:#4ea1ff"></span> mount / register</div>
  <div class="row"><span class="dot" style="border-color:#5fd96b;background:#10240f"></span> fix count &nbsp; <span class="dot" style="border-color:#ff4d6a;background:#2a1014"></span> bug count</div>`;

      /* ---- pan + zoom ---- */
      let tx = 0,
        ty = 0,
        scale = 1;
      function applyTransform() {
        document
          .getElementById('vp')
          .setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
      }
      function fit() {
        const vb = { w: 3060, h: 1330 };
        const r = stage.getBoundingClientRect();
        scale = Math.min(r.width / vb.w, r.height / vb.h) * 0.98;
        tx = (r.width - vb.w * scale) / 2;
        ty = (r.height - vb.h * scale) / 2;
        applyTransform();
      }
      function screenToVB(px, py) {
        const r = stage.getBoundingClientRect();
        return { x: px - r.left, y: py - r.top };
      }
      function stageCenter() {
        const r = stage.getBoundingClientRect();
        return [r.width / 2, r.height / 2];
      }
      // Zoom by factor f, keeping the point (cx, cy) in stage space fixed.
      function zoomAt(cx, cy, f) {
        const next = Math.max(0.15, Math.min(4, scale * f));
        const k = next / scale;
        tx = cx - (cx - tx) * k;
        ty = cy - (cy - ty) * k;
        scale = next;
        applyTransform();
      }
      // Pan the given node into view (used by keyboard Tab navigation).
      function ensureVisible(n) {
        const r = stage.getBoundingClientRect();
        const m = 90;
        const cx = (n.x + n.w / 2) * scale + tx;
        const cy = (n.y + n.h / 2) * scale + ty;
        let dx = 0,
          dy = 0;
        if (cx < m) dx = m - cx;
        else if (cx > r.width - m) dx = r.width - m - cx;
        if (cy < m) dy = m - cy;
        else if (cy > r.height - m) dy = r.height - m - cy;
        if (dx || dy) {
          tx += dx;
          ty += dy;
          applyTransform();
        }
      }
      stage.addEventListener(
        'wheel',
        (ev) => {
          ev.preventDefault();
          const f = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
          const p = screenToVB(ev.clientX, ev.clientY);
          zoomAt(p.x, p.y, f); // zoom anchored at cursor
        },
        { passive: false }
      );
      let dragging = false,
        moved = false,
        lx = 0,
        ly = 0;
      stage.addEventListener('mousedown', (ev) => {
        if (ev.button !== 0) return;
        dragging = true;
        moved = false;
        lx = ev.clientX;
        ly = ev.clientY;
        stage.classList.add('panning');
      });
      window.addEventListener('mousemove', (ev) => {
        if (!dragging) return;
        if (Math.abs(ev.clientX - lx) + Math.abs(ev.clientY - ly) > 3) moved = true;
        tx += ev.clientX - lx;
        ty += ev.clientY - ly;
        lx = ev.clientX;
        ly = ev.clientY;
        applyTransform();
      });
      window.addEventListener('mouseup', () => {
        dragging = false;
        stage.classList.remove('panning');
      });
      stage.addEventListener('click', (ev) => {
        // A pan that ends on the background must not clear the selection.
        if (moved) {
          moved = false;
          return;
        }
        if (ev.target === stage || ev.target === svg || ev.target.id === 'vp') {
          pinned = null;
          hover = null;
          renderSidebar(null);
          applyView();
        }
      });
      document.getElementById('zin').onclick = () => zoomAt(...stageCenter(), 1.2);
      document.getElementById('zout').onclick = () => zoomAt(...stageCenter(), 1 / 1.2);
      document.getElementById('fit').onclick = fit;

      /* ---- keyboard shortcuts + help overlay ---- */
      const helpEl = document.getElementById('kbd-help');
      const helpBtn = document.getElementById('help-btn');
      const helpClose = document.getElementById('kbd-help-close');

      // Collect all keyboard-focusable elements inside the dialog.
      function helpFocusables() {
        return Array.from(
          helpEl.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          )
        ).filter((el) => !el.hasAttribute('disabled'));
      }

      function openHelp() {
        helpEl.removeAttribute('hidden');
        helpBtn.setAttribute('aria-expanded', 'true');
        // Move focus into the dialog (to the close button).
        const first = helpFocusables()[0];
        if (first) first.focus();
      }
      function closeHelp() {
        helpEl.setAttribute('hidden', '');
        helpBtn.setAttribute('aria-expanded', 'false');
        // Return focus to the opener.
        helpBtn.focus();
      }
      const toggleHelp = () => {
        if (helpEl.hasAttribute('hidden')) openHelp();
        else closeHelp();
      };

      helpBtn.onclick = toggleHelp;
      helpClose.onclick = closeHelp;

      // Focus trap inside the dialog while it is open.
      helpEl.addEventListener('keydown', (ev) => {
        if (ev.key === 'Escape') {
          ev.stopPropagation();
          closeHelp();
          return;
        }
        if (ev.key !== 'Tab') return;
        const focusable = helpFocusables();
        if (!focusable.length) { ev.preventDefault(); return; }
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (ev.shiftKey) {
          if (document.activeElement === first) {
            ev.preventDefault();
            last.focus();
          }
        } else {
          if (document.activeElement === last) {
            ev.preventDefault();
            first.focus();
          }
        }
      });

      window.addEventListener('keydown', (ev) => {
        const t = ev.target;
        if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA')) return;
        if (ev.metaKey || ev.ctrlKey || ev.altKey) return;
        // While the help dialog is open, only Escape is handled globally
        // (Tab is trapped inside the dialog via its own listener above).
        if (!helpEl.hasAttribute('hidden')) {
          if (ev.key === 'Escape') {
            ev.preventDefault();
            closeHelp();
          }
          return;
        }
        const [cx, cy] = stageCenter();
        const step = ev.shiftKey ? 160 : 64;
        switch (ev.key) {
          case 'ArrowLeft':
            tx += step;
            applyTransform();
            ev.preventDefault();
            break;
          case 'ArrowRight':
            tx -= step;
            applyTransform();
            ev.preventDefault();
            break;
          case 'ArrowUp':
            ty += step;
            applyTransform();
            ev.preventDefault();
            break;
          case 'ArrowDown':
            ty -= step;
            applyTransform();
            ev.preventDefault();
            break;
          case '+':
          case '=':
            zoomAt(cx, cy, 1.2);
            ev.preventDefault();
            break;
          case '-':
          case '_':
            zoomAt(cx, cy, 1 / 1.2);
            ev.preventDefault();
            break;
          case '0':
          case 'f':
          case 'F':
            fit();
            ev.preventDefault();
            break;
          case '?':
            toggleHelp();
            ev.preventDefault();
            break;
          case 'Escape':
            pinned = null;
            hover = null;
            if (document.activeElement && document.activeElement.blur)
              document.activeElement.blur();
            renderSidebar(null);
            applyView();
            ev.preventDefault();
            break;
        }
      });

      /* ---- boot ---- */
      renderSidebar(null);
      applyView();
      window.addEventListener('resize', fit);
      fit();
    </script>
