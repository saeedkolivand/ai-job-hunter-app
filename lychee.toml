# lychee link-checker config — https://lychee.cli.rs
# Advisory in CI (see .github/workflows/quality.yml).

# Don't flag local/dev URLs.
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
]

# Skip generated / vendored trees.
exclude_path = ["node_modules", "graphify-out", "apps/desktop/src-tauri/target", "dist", "out"]

# Treat 429 (rate-limited) as OK so flaky external hosts don't add noise.
accept = ["200..=299", "429"]
