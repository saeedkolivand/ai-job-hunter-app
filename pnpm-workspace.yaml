packages:
  - 'apps/*'
  - 'packages/*'

# typescript per-importer split (temporary): workspace packages (apps/*, packages/*)
# declare typescript ^7.0.2 and typecheck with the TS 7 native compiler. The ROOT
# manifest keeps typescript ^6.0.3 ONLY for the eslint stack — typescript-eslint 8.x
# caps its typescript peer at <6.1.0 and typescript-estree crashes under TS 7. pnpm
# resolves peers per importer, so the lint chain gets 6.0.3 while builds use 7.
# Remove when typescript-eslint supports TS 7: bump root to ^7 and unify all manifests.
# (Peer pinning via overrides/packageExtensions cannot do this: an ancestor-provided
# peer always wins resolution, verified on pnpm 11.10.0.)

# Security overrides — pin transitive deps to patched ranges.
# esbuild <0.28.1: GHSA-gv7w-rqvm-qjhr (RCE via NPM_CONFIG_REGISTRY); transitive dev-only (vitest/vite/storybook chains).
overrides:
  esbuild: '>=0.28.1 <0.29'
allowBuilds:
  '@ast-grep/cli': true
  '@swc/core': true
  better-sqlite3: true
  core-js: false
  esbuild: true
  lzma-native: true
  sharp: false
  tesseract.js: true

# Dependency hoisting settings
nodeLinker: isolated
shamefullyHoist: true

# Peer dependency settings
strictPeerDependencies: false
autoInstallPeers: true

# Build settings
enablePrePostScripts: true

# Supply-chain cooldown: refuse versions younger than 24h (minutes) — was pnpm's
# invisible default; committed here so the policy is explicit and reviewable.
minimumReleaseAge: 1440

# minimumReleaseAge cooldown exemptions — these exact versions may be installed
# before the cooldown window elapses (added alongside this change's dependency bump).
# TRANSIENT: each entry can be removed once that version has aged past the cooldown
# window; they are not permanent pins.
minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.62.0'
  - '@typescript-eslint/parser@8.62.0'
  - '@typescript-eslint/project-service@8.62.0'
  - '@typescript-eslint/scope-manager@8.62.0'
  - '@typescript-eslint/tsconfig-utils@8.62.0'
  - '@typescript-eslint/type-utils@8.62.0'
  - '@typescript-eslint/types@8.62.0'
  - '@typescript-eslint/typescript-estree@8.62.0'
  - '@typescript-eslint/utils@8.62.0'
  - '@typescript-eslint/visitor-keys@8.62.0'
  - '@semantic-release/github@12.0.9'
  - '@types/node@26.1.0'
  - globals@17.7.0
  - knip@6.18.0
  - lucide-react@1.23.0
  - typescript-eslint@8.62.0
