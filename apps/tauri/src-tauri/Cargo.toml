[package]
name = "ajh-tauri"
version = "1.3.1"
edition = "2021"
description = "AI Job Hunter — Tauri desktop shell"
authors = ["Saeed Kolivand"]

# Disable default binary stripping so debug symbols survive in dev builds.
[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-ico", "image-png"] }
tauri-plugin-shell = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-updater = "2"
tauri-plugin-clipboard-manager = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# HTTP client for proxying scraper commands to the sidecar process.
reqwest = { version = "0.13", features = ["json", "native-tls"], default-features = false }
tokio = { version = "1", features = ["time"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
# OS-native secret storage: DPAPI (Windows), Keychain (macOS), libsecret (Linux).
# Same underlying primitives as Electron's safeStorage.
keyring = { version = "3", features = ["windows-native", "apple-native", "sync-secret-service"] }
sysinfo = { version = "0.33", default-features = false, features = ["system"] }
rusqlite = { version = "0.32", features = ["bundled"] }
pdf-extract = "0.7"
zip = "2"
quick-xml = "0.37"
